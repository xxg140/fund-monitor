<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>基金持仓监控</title>
<style>
  /* ===== CSS 变量：定义后深色模式只需改这些值 ===== */
  :root {
    --bg-page: #ffffff;
    --bg-surface: #f3f7fb;
    --bg-surface-2: #e2eaf3;
    --bg-surface-3: #d0dce9;
    --bg-hover: rgba(0,0,0,0.04);
    --bg-hover-strong: rgba(0,0,0,0.08);
    --bg-overlay: rgba(15,23,42,0.55);
    --bg-toast: #0f172a;
    --bg-danger: rgba(239,68,68,0.1);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --text-on-dark: #ffffff;
    --border-default: #e2e8f0;
    --border-subtle: #cbd5e1;
    --border-hover: #94a3b8;
    /* 主题色 */
    --accent: #3b82f6;
    --accent-dark: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: #eff6ff;
    --accent-border: #bfdbfe;
    /* 涨跌色 */
    --color-up: #ef4444;
    --color-up-hover: #dc2626;
    --color-up-bg: rgba(239,68,68,0.1);
    --color-down: #22c55e;
    --color-down-hover: #16a34a;
    --color-down-bg: rgba(34,197,94,0.1);
  }
  body.dark {
    --bg-page: #000000;
    --bg-surface: #0f172a;
    --bg-surface-2: #152030;
    --bg-surface-3: #1c2d42;
    --bg-hover: rgba(255,255,255,0.06);
    --bg-hover-strong: rgba(255,255,255,0.1);
    --bg-overlay: rgba(0,0,0,0.7);
    --bg-toast: #0f172a;
    --bg-danger: rgba(239,68,68,0.1);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --text-on-dark: #000000;
    --border-default: #334155;
    --border-subtle: #475569;
    --border-hover: #64748b;
    /* 主题色（深色模式下更亮 */
    --accent: #60a5fa;
    --accent-dark: #3b82f6;
    --accent-hover: #2563eb;
    --accent-light: rgba(59,130,246,0.15);
    --accent-border: rgba(59,130,246,0.3);
    /* 涨跌背景（深浅统一） */
    --color-up-bg: rgba(239,68,68,0.1);
    --color-down-bg: rgba(34,197,94,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { touch-action: manipulation; scrollbar-width: none; -ms-overflow-style: none; }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-page); color: var(--text-secondary); min-height: 100vh;
    max-width: 480px; margin: 0 auto;
    padding-bottom: 12px;
  }

  /* 头部 - 高级渐变 */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e293b 100%);
    padding: 16px 0 12px; color: white;
    position: relative; overflow: hidden;
    border-radius: 10px;
    margin: 0;
  }
  .header::before {
    content: ''; position: absolute; top: -60%; right: -10%;
    width: 280px; height: 280px; background: rgba(255,255,255,0.04);
    border-radius: 50%; pointer-events: none;
  }
  .header::after {
    content: ''; position: absolute; bottom: -40%; left: -5%;
    width: 200px; height: 200px; background: rgba(59,130,246,0.08);
    border-radius: 50%; pointer-events: none;
  }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.3px; padding-left: 10px; }
  .header .update-time { font-size: 10px; opacity: 0.7; font-weight: 400; padding-left: 10px; }

  /* ===== 指数栏 ===== */
  .index-bar {
    padding: 8px 0; display: flex; gap: 10px; align-items: flex-start; overflow-x: auto;
  }
  #indexCards { display: grid; grid-template-columns: repeat(3, minmax(80px, 1fr)); gap: 6px; flex: 1; }
  .index-card {
    border-radius: 10px; padding: 8px 4px;
    text-align: center; cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
    transition: all 0.2s ease;
  }
  @media (hover: hover) {
  .index-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  }

  .index-card:active { transform: translateY(0) scale(0.98); }

  /* 指数卡片渐变背景 */
  .index-card.border-up {
    background: radial-gradient(circle at 0% 0%, rgba(239,68,68,0.18) 0%, rgba(239,68,68,0.06) 40%, transparent 70%), var(--bg-surface);
  }
  .index-card.border-down {
    background: radial-gradient(circle at 0% 0%, rgba(34,197,94,0.18) 0%, rgba(34,197,94,0.06) 40%, transparent 70%), var(--bg-surface);
  }
  .index-card.border-flat {
    background: radial-gradient(circle at 0% 0%, rgba(148,163,184,0.10) 0%, rgba(148,163,184,0.03) 40%, transparent 70%), var(--bg-surface);
  }
  .index-name { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; height: 14px; line-height: 14px; overflow: hidden; white-space: nowrap; }
  .index-value { font-size: 15px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; height: 20px; line-height: 20px; }
  .index-value.up { color: var(--color-up); }
  .index-value.down { color: var(--color-down); }
  .index-value.flat { color: var(--text-primary); }
  .index-change-row { font-size: 10px; margin-top: 3px; font-weight: 600; height: 14px; line-height: 14px; }
  .index-change-row.up { color: var(--color-up); }
  .index-change-row.down { color: var(--color-down); }
  .index-change-row.flat { color: var(--text-muted); }

  /* 汇总栏 */
  .summary-bar {
    padding: 8px 0; display: flex;
    gap: 6px;
    box-shadow: none;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .summary-item {
    flex: 1; min-width: 72px; text-align: center;
    padding: 5px 10px; border-radius: 10px;
    background: var(--bg-surface); border: none;
    display: flex; flex-direction: column; justify-content: center;
    min-height: 48px;
  }
  .summary-item:hover { background: var(--bg-surface-2); }
  .summary-item .label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.3px; height: 14px; line-height: 14px; margin-bottom: 2px; }
  .summary-item .value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; height: 18px; line-height: 18px; }
  .value.up { color: var(--color-up); } .value.down { color: var(--color-down); } .value.flat { color: var(--text-primary); }
  .summary-profit-block { position: relative; }
  .summary-profit-block .sub-value { font-size: 10px; font-weight: 600; margin-top: 2px; opacity: 0.85; height: 14px; line-height: 14px; }

  /* 分组标签栏 - 内联在操作区 */
  .group-bar-inline {
    display: flex;
    gap: 8px;
    align-items: center;
    overflow-x: auto;
  }
  #groupTabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .group-tab {
    padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
    border: 1px solid var(--border-default); background: var(--bg-surface-3); color: var(--text-muted);
    display: flex; align-items: center; box-sizing: border-box;
  }
  .group-tab:hover { border-color: var(--border-hover); color: var(--text-secondary); }
  .group-tab.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: white; border-color: transparent;
    box-shadow: 0 1px 3px rgba(59,130,246,0.3);
  }
  /* 操作区域 */
  .action-area {
    padding: 8px 3px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .action-input {
    border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 10px;
    font-size: 14px; outline: none; background: var(--bg-surface); color: var(--text-primary);
    transition: all 0.15s;
  }
  .action-input:focus { border-color: var(--accent); background: var(--bg-surface-2); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .action-input::placeholder { color: var(--text-muted); }
  .action-input.code-input { width: 90px; }
  .action-input.amount-input { width: 100px; }
  .action-btn {
    padding: 6px 14px; border: none; border-radius: 10px;
    font-size: 12px; cursor: pointer; font-weight: 500;
    transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
  }
  .action-btn:focus, .action-btn:focus-visible { outline: none; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: white; box-shadow: 0 1px 3px rgba(59,130,246,0.3);
  }
  .btn-primary:hover { background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent-hover) 100%); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg-surface-3); color: var(--text-muted); border: 1px solid var(--border-default); }
  .btn-secondary:active { transform: scale(0.97); }
  .btn-success { background: var(--color-down); color: white; }
  .btn-success:hover { background: var(--color-down-hover); transform: translateY(-1px); }
  .btn-danger { background: var(--color-up); color: white; }
  .btn-danger:hover { background: var(--color-up-hover); transform: translateY(-1px); }

  /* 更多下拉菜单 */
  .more-wrap { position: relative; }
  .more-dropdown {
    position: absolute; top: 100%; left: 0; margin-top: 6px;
    background: var(--bg-surface); border-radius: 10px; min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
    z-index: 100; display: none; overflow: hidden;
    border: 1px solid var(--border-subtle);
  }
  .more-dropdown.active { display: block; }
  .more-item {
    padding: 11px 18px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid var(--border-default); color: var(--text-secondary);
    font-weight: 500; transition: all 0.1s;
  }
  .more-item:last-child { border-bottom: none; }
  .more-item:hover { background: var(--bg-surface-2); color: var(--text-primary); }
  .more-item.danger { color: var(--color-up); }
  .more-item.danger:hover { background: var(--color-up-bg); }

  /* 添加/批量面板 */
  .add-panel, .batch-panel {
    background: var(--bg-surface); padding: 16px 3px; border-bottom: 1px solid var(--border-subtle); display: none;
    border-radius: 10px; margin: 10px 3px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .add-panel.active, .batch-panel.active { display: block; }
  .add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .batch-textarea {
    width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border-default);
    border-radius: 10px; font-size: 12px; color: var(--text-primary); font-family: monospace; resize: vertical;
    background: var(--bg-surface); outline: none;
  }
  .batch-textarea:focus { border-color: var(--accent); background: var(--bg-surface-2); }
  /* ===== 列表表头 ===== */
  .fund-grid {
    display: block;
  }

  /* 表头行（独立grid，列宽由JS inline设置） */
  .lh-row {
    display: grid; gap: 0;
  }
  .lh-row .lh-cell {
    cursor: pointer; padding: 8px 8px; line-height: 1.6;
    overflow: hidden; white-space: nowrap; text-align: left;
    font-size: 10px; color: var(--text-secondary); font-weight: 600;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border-default);
    user-select: none;
  }
  .lh-row .lh-cell:hover { color: var(--accent); }

  /* 名称列固定左侧 */
  .lh-row .lh-cell:first-child,
  .fm-name {
    position: sticky; left: 0; z-index: 1;
    background: var(--bg-surface);
  }

  .sort-arrow { font-size: 10px; margin-left: 2px; }
  .lh-sort.asc .sort-arrow::after { content: '↑'; color: var(--accent); }
  .lh-sort.desc .sort-arrow::after { content: '↓'; color: var(--accent); }
  .col-gear { cursor: pointer; font-size: 12px; opacity: 0.5; margin-left: 4px; vertical-align: -1px; }
  .col-gear:hover { opacity: 1; }

  /* ===== 基金列表卡片（包裹分组标签 + 表头 + 基金行） ===== */
  .fund-card {
    background: var(--bg-surface);
    border-radius: 10px;
    margin: 6px 3px;
    overflow-x: auto;
    box-shadow: none;
    scrollbar-width: none;
  }
  .fund-card::-webkit-scrollbar { height: 0; }

  /* ===== 基金行（独立grid，列宽由JS inline设置） ===== */
  .fund-row {
    display: grid; gap: 0;
  }
  .fund-row > div {
    padding: 6px 8px; white-space: nowrap;
    text-align: left; border-bottom: 1px solid var(--border-default); background: var(--bg-surface);
  }
  .fund-row:last-of-type > div { border-bottom: none; }
  /* 名称区 */
  .fm-name { display: flex; flex-direction: column; min-width: 0; }
  .fm-fundname {
    font-weight: 600; font-size: 14px; color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .updated-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--accent-dark);
    background: var(--accent-light);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    padding: 1px 6px;
    font-weight: 500;
    line-height: 1.3;
    white-space: nowrap;
  }


  /* 持有金额（名称下方显示） */
  .fm-amount-val { font-weight: 600; font-size: 13px; color: var(--text-secondary); margin-top: 1px; }

  /* 基金列表单元格公共样式 */
  .fm-rate, .fm-today, .fm-total, .fm-dwjz, .fm-cost, .fm-shares, .fm-ratio, .fm-sector, .fm-code, .fm-gsz { display: flex; flex-direction: column; justify-content: center; }
  .fm-rate, .fm-today, .fm-total { text-align: left; }
  .fm-rate-val, .fm-total-val { font-weight: 700; font-size: 14px; }
  .fm-rate-val.up { color: var(--color-up); } .fm-rate-val.down { color: var(--color-down); }
  .fm-profit { font-size: 14px; font-weight: 700; }
  .fm-profit.up { color: var(--color-up); } .fm-profit.down { color: var(--color-down); }
  .fm-total-rate { font-size: 10px; margin-top: 1px; font-weight: 600; }
  .fm-total-rate.up { color: var(--color-up); } .fm-total-rate.down { color: var(--color-down); }
  .fm-total-val.up { color: var(--color-up); } .fm-total-val.down { color: var(--color-down); }
  .fm-dwjz-val, .fm-cost-val, .fm-shares-val, .fm-ratio-val, .fm-gsz-val, .fm-sector-val, .fm-code-val { font-size: 12px; font-weight: 500; color: var(--text-secondary); }


  /* ===== 展开详情面板（已改为弹窗 #fundDetailModal） ===== */

  .detail-inner { padding: 6px 2px; }
  .detail-main {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-wrap: nowrap;
  }
  .trend-chart-wrapper {
    flex: 1 1 0;
    min-width: 0;
    width: 100%;
    position: relative;
    height: 220px;
  }
  .trend-chart { width: 100%; height: 100%; border-radius: 10px; background: var(--bg-surface); display: block; }
  .chart-loading {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-surface);
    border-radius: 10px;
    z-index: 10;
    transition: opacity 0.3s;
  }
  .chart-loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .chart-loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-default);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: chart-spin 0.8s linear infinite;
  }
  @keyframes chart-spin {
    to { transform: rotate(360deg); }
  }
  body.dark .chart-loading {
    background: var(--bg-surface-3);
  }
  body.dark .chart-loading-spinner {
    border-color: var(--text-muted);
    border-top-color: var(--accent);
  }
  .detail-controls { display: flex; flex-direction: column; gap: 6px; padding: 4px 0; width: 100%; }
  .detail-controls .chart-tabs { display: flex; flex-direction: row; gap: 6px; flex: 1; }
  .detail-controls .chart-tab { padding: 3px 0; font-size: 12px; text-align: center; flex: 1; display: block; border: 1px solid var(--border-default); border-radius: 10px; background: var(--bg-surface); color: var(--text-muted); cursor: pointer; font-weight: 500; box-sizing: border-box; line-height:1; }
  .chart-tab { padding: 8px 10px; font-size: 12px; border: 1px solid var(--border-default); border-radius: 10px; background: var(--bg-surface); color: var(--text-muted); cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; min-width:44px; box-sizing: border-box; display:inline-block; line-height:1; }
  .chart-tab:hover { border-color: var(--border-hover); color: var(--text-secondary); }
  .chart-tab.active { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); color: white; border-color: transparent; box-shadow: 0 1px 3px rgba(59,130,246,0.3); }
  .chart-tab.gear-tab { padding:8px 5px; border:none; background:transparent; color: var(--text-muted); font-size:14px; min-width:26px; text-align:center; margin-left:auto; }
  #actionModal .chart-tab { flex: 1; text-align: center; }

  /* 周期Tabs排序面板 */
  #tabSettings {
    position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:var(--bg-surface); border:1px solid var(--border-default); border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.15); z-index:9999;
    padding:16px; min-width:260px; display:none;
  }
  #tabSettings .ts-title { font-weight:600; font-size:14px; color:var(--text-primary); margin-bottom:12px; }
  #tabSettings .ts-row, #colSettingsModal .ts-row { display:flex; align-items:center; gap:8px; padding:6px 8px; margin:0 -8px; border-radius:6px; cursor:grab; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:none; transition:background 0.15s, transform 0.15s; }
  #tabSettings .ts-row:active, #colSettingsModal .ts-row:active { cursor:grabbing; }
  #tabSettings .ts-row .ts-drag, #colSettingsModal .ts-row .ts-drag { color:var(--text-muted); font-size:14px; cursor:grab; flex-shrink:0; }
  #tabSettings .ts-row .ts-label, #colSettingsModal .ts-row .ts-label { font-size:12px; color: var(--text-secondary); flex:1; }
  #tabSettings .ts-row.dragging, #colSettingsModal .ts-row.dragging { opacity:0.4; }
  #tabSettings .ts-row.drag-over, #colSettingsModal .ts-row.drag-over { background:var(--border-default); }
  #tabSettings .ts-ok { margin-top:12px; width:100%; padding:6px 0; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:13px; font-weight:500; cursor:pointer; }
  #tabSettings .ts-ok:hover { background:var(--accent-dark); }
  #tabSettings .ts-hint, #colSettingsModal .ts-hint { font-size:11px; color:var(--text-muted); text-align:left; margin-top:6px; }
  #tabSettings-overlay { position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:9998; display:none; }

  /* 展开面板底部信息行 */
  .detail-info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0px;
    background: var(--bg-surface);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .period-change {
    font-size: 12px; font-weight:500; min-width: 110px; padding-left: 0; }
  .period-change .fund-label { font-weight:500; color:var(--text-muted); }
  .period-change .fund-pct { font-weight:600; }
  .period-change .fund-pct.up { color: var(--color-up); }
  .period-change .fund-pct.down { color: var(--color-down); }
  body.dark .period-change .fund-label { color: var(--text-muted); }
  .detail-info-code { min-width: 105px; margin-left: -4px; font-weight: 500; color: var(--text-muted); }
  .detail-info-time { min-width: 60px; flex-shrink: 0; margin-left: -4px; color: var(--text-muted); font-weight: 500; }
  /* 指数参考 */
  .index-ref { background: var(--bg-surface-2); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; border: 1px solid var(--border-default); }
  .index-ref.warning { background: var(--color-up-bg); border-color: var(--color-up); }
  .index-ref-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .index-ref-row {
    font-size: 12px; display: flex; gap: 16px; color: var(--text-secondary); flex-wrap: wrap; }
  .index-diff { font-weight: 600; color: var(--text-primary); }
  .index-warning {
    font-size: 12px; margin-top: 6px; color: var(--color-up); font-weight: 500; }

  /* 分组管理弹窗 */
  .group-list-item {
    display: flex; align-items: center; gap: 8px; padding: 10px 0;
    border-bottom: 1px solid var(--border-default);
  }
  .group-list-item:last-child { border-bottom: none; }
  .group-list-name {
    flex: 1; font-size: 14px; color: var(--text-primary); font-weight: 500;
    background: transparent; border: none; outline: none;
  }
  .group-list-name:focus { background: var(--bg-surface-2); border-radius: 10px; padding: 2px 6px; }
  .group-list-del {
    padding: 4px 10px; font-size: 12px; border: none; border-radius: 10px;
    cursor: pointer; background: var(--color-up-bg); color: var(--color-up); font-weight: 500;
  }
  .group-list-del:hover { background: var(--bg-hover-strong); }
  .group-add-row {
    display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
  }

  /* ===== 弹窗通用 ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--bg-overlay);
    display: none; align-items: center; justify-content: center; z-index: 2000;
    backdrop-filter: blur(4px);
  }
  #actionModal { z-index: 2100; }
  .modal-overlay.active { display: flex; }
  #confirmModal { z-index: 3000; }
  .modal-box {
    background: var(--bg-surface); border-radius: 10px; width: 90%; max-width: 420px;
    max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.1);
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
    font-size: 14px; font-weight: 600; display: flex; color: var(--text-primary);
    justify-content: space-between; align-items: center;
  }
  .modal-close {
    font-size: 24px; color: var(--text-muted); cursor: pointer; background: none; border: none; transition: color 0.15s; line-height: 1; padding: 0 4px; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 16px 20px; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .modal-body::-webkit-scrollbar { width: 0; }
  .modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border-subtle);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* 指数选择 */
  .index-option {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border-default); cursor: pointer;
    transition: all 0.1s;
  }
  .index-option:last-child { border-bottom: none; }
  .index-option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
  .index-option .io-name { font-size: 14px; flex: 1; color: var(--text-primary); font-weight: 500; }
  .index-option .io-code {
    font-size: 12px; color: var(--text-muted); }

  /* 空状态 */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  .empty-state .text { font-size: 14px; font-weight: 500; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    opacity: 0; visibility: hidden; pointer-events: none;
    background: var(--bg-toast); color: white; padding: 12px 24px; border-radius: 10px;
    font-size: 12px; font-weight: 500; z-index: 10000; transition: opacity 0.35s, visibility 0.35s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; visibility: visible; pointer-events: auto; }
  .toast.error { background: var(--color-up); }
  .toast.success { background: var(--color-down); }
  .toast.warning { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); }
  .toast.info { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); }

  /* ===== 金额隐藏 ===== */
  .val-hidden { color: var(--text-muted); letter-spacing: 2px; }

  /* ===== 工具类 ===== */
  .t-9 { font-size: 9px; color: var(--text-muted); }
  .t-10 { font-size: 10px; color: var(--text-muted); }
  /* ===== 深色模式（仅保留变量无法覆盖的特殊规则） ===== */
  body.dark { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  body.dark .index-card { box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  body.dark .index-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
  body.dark .index-card.border-up {
    background: radial-gradient(circle at 0% 0%, rgba(239,68,68,0.30) 0%, rgba(239,68,68,0.08) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .index-card.border-down {
    background: radial-gradient(circle at 0% 0%, rgba(34,197,94,0.30) 0%, rgba(34,197,94,0.08) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .index-card.border-flat {
    background: radial-gradient(circle at 0% 0%, rgba(148,163,184,0.12) 0%, rgba(148,163,184,0.04) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .summary-item:hover { background: var(--bg-hover); }
  body.dark .group-tab.active { box-shadow: 0 1px 3px rgba(59,130,246,0.4); }


  body.dark .more-dropdown { box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  body.dark .more-item:hover { color: var(--text-primary); }
  body.dark .more-item.danger:hover { background: var(--bg-hover-strong); }
  body.dark .add-panel, body.dark .batch-panel { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

  body.dark .updated-tag { color: var(--accent); background: var(--accent-light); border-color: var(--accent-border); }
  body.dark .modal-overlay { background: var(--bg-overlay); }
  body.dark .modal-box { box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  body.dark .index-ref.warning { background: var(--bg-danger); border-color: rgba(239,68,68,0.3); }
  body.dark .group-list-name:focus { background: var(--bg-hover); }
  body.dark .group-list-del:hover { background: var(--bg-hover-strong); }
  body.dark #indexChartInfo { background: var(--bg-surface-2) !important; border-color: #475569 !important; }
  body.dark #indexChartInfo span { color: #f1f5f9 !important; }
  body.dark #indexChartInfo #icDate { color: #ffffff !important; }
  body.dark #indexDetailBody div[style*="color:var(--text-primary)"] { color: #e2e8f0 !important; }
  #indexChartInfo div { color: var(--text-secondary); }
  #indexDetailCanvas { transition: opacity 0.15s ease; }
  #icDate { color: var(--text-secondary); }
  body.dark .chart-tooltip {
    background: var(--bg-surface-3);
    border-color: var(--text-secondary);
    color: #cbd5e1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .version-tag {
    position: absolute; top: 10px; right: 16px;
    font-size: 10px; color: rgba(255,255,255,0.5);
    font-weight: 400; letter-spacing: 0.5px;
  }
  .theme-toggle {
    position: absolute; top: 50%; right: 16px; transform: translateY(-50%);
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 10px; padding: 4px 12px; cursor: pointer;
    font-size: 14px; color: white; transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.25); }

  /* 切主题时禁用过渡，防闪烁 */
  body.no-theme-transition .index-card,
  body.no-theme-transition .summary-item,
  body.no-theme-transition .fund-card,
  body.no-theme-transition .group-tab,
  body.no-theme-transition .modal-box,
  body.no-theme-transition .chart-tab,
  body.no-theme-transition .action-input { transition: none !important; }

  /* 图表十字线提示标签 */
  .chart-tooltip {
    position: absolute;
    background: rgba(255,255,255,1);
    border: 1px solid var(--text-muted);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    width: 130px;
    text-align: center;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    pointer-events: none;
    top: -25px;
    left: 0;
    transform: translateX(-50%);
  }
  .chart-tooltip.visible {
    visibility: visible;
    opacity: 1;
  }
  /* ===== 持仓列表 ===== */
  .holdings-list { display: flex; flex-direction: column; gap: 2px; }
  .holding-item { display: flex; align-items: center; padding: 6px 8px; border-radius: 6px; background: var(--bg-page); border: 1px solid var(--border-default); font-size: 12px; gap: 8px; }
  .holding-item .h-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); font-weight: 500; }
  .holding-item .h-change { min-width: 52px; text-align: right; font-weight: 600; font-size: 11px; }
  .holding-item .h-change.up { color: var(--color-up); }
  .holding-item .h-change.down { color: var(--color-down); }
  .holding-item .h-weight { min-width: 44px; text-align: right; color: var(--text-muted); font-size: 11px; }
  .holding-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 0; }

  /* ===== 详情 Tab 切换 ===== */
  .detail-tabs { display: flex; gap: 0; margin: 0 0 4px; }
  .detail-tab { flex: 1; text-align: center; padding: 6px 0; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .detail-tab:hover { color: var(--text-secondary); }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 历史净值小表 — 圆角卡片风格 */
  .history-mini-table { width: 100%; border-collapse: separate; border-spacing: 0 2px; font-size: 11px; margin-top: 4px; }
  .history-mini-table th { padding: 0 8px 4px; background: none; color: var(--text-muted); font-weight: 500; font-size: 10px; border: none; }
  .history-mini-table td { padding: 5px 8px; background: var(--bg-page); color: var(--text-primary); text-align: center; font-weight: 500; font-size: 12px; border-top: 1px solid var(--border-default); border-bottom: 1px solid var(--border-default); }
  .history-mini-table td:first-child { border-left: 1px solid var(--border-default); }
  .history-mini-table td:last-child { border-right: 1px solid var(--border-default); }
  .history-mini-table td:first-child { border-radius: 6px 0 0 6px; }
  .history-mini-table td:last-child { border-radius: 0 6px 6px 0; }
  .history-mini-table td.up { color: var(--color-up); font-weight: 600; }
  .history-mini-table td.down { color: var(--color-down); font-weight: 600; }

</style>
</head>
<body>

<div class="header">
  <h1>📊 基金持仓监控 <span class="version-tag" id="versionTag"></span></h1>
  <div class="update-time" id="updateTime">等待刷新...</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<!-- 指数栏 -->
<div class="index-bar" id="indexBar">
  <div id="indexCards"></div>
</div>

<!-- 汇总栏 -->
<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="summary-item"><div class="label">总持仓</div><div class="value flat" id="sumLocked">0</div></div>
  <div class="summary-item"><div class="label">实时总估值</div><div class="value flat" id="sumInvest">0</div></div>
  <div class="summary-item"><div class="label">今日收益</div><div class="value" id="sumProfitToday">0</div></div>
  <div class="summary-item summary-profit-block"><div class="label">持有总收益</div><div class="value" id="sumProfitTotal">0</div><div class="value sub-value" id="sumProfitRate">0%</div></div>
</div>

<!-- 操作区域 -->
<div class="action-area">
  <div class="group-bar-inline" id="groupBar" style="display:none;">
    <div id="groupTabs"></div>
  </div>
  <div class="more-wrap">
    <button class="action-btn btn-secondary" onclick="toggleMoreMenu()" id="moreBtn">更多</button>
    <div class="more-dropdown" id="moreDropdown">
      <div class="more-item" onclick="openAddPanel();closeMoreMenu();">➕ 单个添加</div>
      <div class="more-item" onclick="openBatchPanel();closeMoreMenu();">📥 批量导入</div>
      <div class="more-item" onclick="openGlobalOpList();closeMoreMenu();">📋 交易记录</div>
      <div class="more-item" onclick="toggleAutoRefresh();closeMoreMenu();" id="moreAutoRefreshItem">⏱ 自动刷新</div>
      <div class="more-item" onclick="openGroupModal();closeMoreMenu();">📁 管理分组</div>
      <div class="more-item" onclick="openSectorPanel();closeMoreMenu();">🔗 关联板块</div>

      <div class="more-item" onclick="toggleHideMarketVal();closeMoreMenu();" id="moreHideMvItem">🙈 隐藏金额</div>
      <div class="more-item danger" onclick="clearAllFunds();closeMoreMenu();">🗑 清空</div>
    </div>
  </div>
  <button class="action-btn btn-secondary" onclick="refreshAll()">🔄 刷新</button>
</div>

<!-- 单个添加面板 -->
<div class="add-panel" id="addPanel">
  <div class="add-row">
    <input type="text" class="action-input code-input" id="addCode" placeholder="基金代码" maxlength="6" style="font-size:11px;" />
    <input type="number" class="action-input amount-input" id="addAmount" placeholder="持有金额" step="0.01" min="0" style="font-size:11px;" />
    <input type="number" class="action-input amount-input" id="addProfit" placeholder="持有收益" step="0.01" style="font-size:11px;" />
    <input type="date" class="action-input" id="addPurchaseDate" style="width:150px;" />
    <input type="text" class="action-input" id="addSector" placeholder="板块名" style="width:80px;font-size:11px;" />
    <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:3px;white-space:nowrap;cursor:pointer;">
      <input type="checkbox" id="addIsUpdated" checked /> 已更新
    </label>
    <button class="action-btn btn-primary" onclick="submitAddFund()">添加</button>
    <button class="action-btn btn-secondary" onclick="closeAddPanel()">取消</button>
  </div>
</div>

<!-- 批量导入 -->
<div class="batch-panel" id="batchPanel">
  <textarea class="batch-textarea" id="batchInput" placeholder="基金代码 持有金额 持有收益 买入日期 板块
示例：
000001 10000 500 2026-04-20 半导体"></textarea>
  <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
    <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:3px;cursor:pointer;">
      <input type="checkbox" id="batchIsUpdated" checked /> 已更新
    </label>
    <div style="flex:1;"></div>
    <button class="action-btn btn-success" onclick="importBatchFunds()">确认导入</button>
    <button class="action-btn btn-secondary" onclick="closeBatchPanel()">取消</button>
  </div>
</div>

<!-- 基金列表 -->
<div id="fundListArea">
  <div class="fund-card">
    <div id="fundList" class="fund-grid"></div>
  </div>
</div>

<!-- 指数选择弹窗 -->
<div class="modal-overlay" id="indexModal" onclick="if(event.target===this)closeIndexModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>选择显示的指数（最多6个）</span>
      <button class="modal-close" onclick="closeIndexModal()">×</button>
    </div>
    <div class="modal-body" id="indexOptions"></div>
    <div class="modal-footer">
      <button class="action-btn btn-secondary" onclick="resetIndexSelection()">恢复默认</button>
      <button class="action-btn btn-secondary" onclick="closeIndexModal()">取消</button>
      <button class="action-btn btn-primary" onclick="saveIndexSelection()">保存</button>
    </div>
  </div>
</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirmModal" onclick="if(event.target===this)closeConfirmModal()">
  <div class="modal-box" style="max-width:320px;">
    <div class="modal-header">
      <span id="confirmTitle">确认操作</span>
      <button class="modal-close" onclick="closeConfirmModal()">×</button>
    </div>
    <div class="modal-body" id="confirmBody" style="font-size:14px;color:var(--text-secondary);"></div>
    <div class="modal-footer">
      <button class="action-btn btn-secondary" onclick="closeConfirmModal()">取消</button>
      <button class="action-btn btn-danger" id="confirmBtn" onclick="executeConfirm()">确认</button>
    </div>
  </div>
</div>

<!-- 分组管理弹窗 -->
<div class="modal-overlay" id="groupModal" onclick="if(event.target===this)closeGroupModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>管理分组</span>
      <button class="modal-close" onclick="closeGroupModal()">×</button>
    </div>
    <div class="modal-body" id="groupModalBody"></div>
    <div class="modal-footer">
      <button class="action-btn btn-secondary" onclick="closeGroupModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 全局操作记录弹窗 -->
<div class="modal-overlay" id="globalOpModal" onclick="if(event.target===this)closeGlobalOpModal()">
  <div class="modal-box" style="max-width:480px;">
    <div class="modal-header">
      <span>全部交易记录</span>
      <button class="modal-close" onclick="closeGlobalOpModal()">×</button>
    </div>
    <div class="modal-body" id="globalOpModalBody" style="padding:12px 16px;max-height:60vh;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="action-btn btn-secondary" onclick="closeGlobalOpModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 操作弹窗 -->
<div class="modal-overlay" id="actionModal" onclick="if(event.target===this)closeActionModal()">
  <div class="modal-box" style="max-width:380px;">
    <div class="modal-header">
      <span id="actionModalTitle">操作</span>
      <button class="modal-close" onclick="closeActionModal()">×</button>
    </div>
    <div class="modal-body" id="actionModalBody" style="padding:16px 20px;"></div>
  </div>
</div>

<!-- 指数详情弹窗 -->
<div class="modal-overlay" id="indexDetailModal" onclick="if(event.target===this)closeIndexDetail()">
  <div class="modal-box" style="max-width:440px;">
    <div class="modal-header">
      <span id="indexDetailTitle">指数详情</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="action-btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="closeIndexDetail();setTimeout(openIndexModal,200)">切换指数</button>
        <button class="modal-close" onclick="closeIndexDetail()">×</button>
      </div>

      <!-- 周期切换 -->
      <div id="indexDetailTabs" style="display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;"></div>

        <canvas id="indexDetailCanvas" style="width:100%;height:100%;"></canvas>
      </div>
    </div>
  </div>

<!-- 关联板块弹窗 -->
<div class="modal-overlay" id="sectorModal" onclick="if(event.target===this)closeSectorPanel()">

天弘恒生科技 半导体" style="width:100%;height:200px;"></textarea>

<div class="modal-overlay" id="fundDetailModal" onclick="if(event.target===this)closeFundDetailModal()">

    </div>
    <div class="modal-body" id="fundDetailBody" style="padding:0;overflow-y:auto;max-height:70vh;"></div>

<div class="toast" id="toast"></div>

<div id="tabSettings">

// 主题模式：'auto' | 'dark' | 'light'
function getSystemTheme() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(mode) {
  const isDark = mode === 'dark' || (mode === 'auto' && getSystemTheme() === 'dark');
  document.body.classList.toggle('dark', isDark);
  updateThemeIcon();
}
function loadTheme() {
  const saved = localStorage.getItem('fund_monitor_theme');
  if (saved === 'dark' || saved === 'light') {
    applyTheme(saved);
  } else {
    localStorage.setItem('fund_monitor_theme', 'auto');
    applyTheme('auto');
  }
}
function toggleTheme() {
  document.body.classList.add('no-theme-transition');
  const current = localStorage.getItem('fund_monitor_theme') || 'auto';
  // 循环：auto -> dark -> light -> auto
  let next;
  if (current === 'auto') next = 'dark';
  else if (current === 'dark') next = 'light';
  else next = 'auto';
  
  localStorage.setItem('fund_monitor_theme', next);
  applyTheme(next);
  
  // 显示提示
  const modeText = next === 'auto' ? '自动' : (next === 'dark' ? '深色' : '浅色');
  showToast(`已切换至${modeText}模式`);
  
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.body.classList.remove('no-theme-transition');
    // 重绘弹窗内折线图适配深色/浅色
    const c = document.querySelector('#fundDetailModal .trend-chart');

      const costNav = _costNav(fund);

// 共享拖拽排序
function _initDragSort(container, rowSel, dataAttr, onReorder) {
  // 移除上次拖拽残留的监听器，防止叠加
  if (container._dragCleanup) container._dragCleanup();
  let dragIdx = -1, dragOverRow = null, _allRows = null;
  const prevent = e => e.preventDefault();
  const getRowAt = y => {
    for (const r of _allRows) { const rc = r.getBoundingClientRect(); if (y >= rc.top && y <= rc.bottom) return r; }
    return null;
  };
  const cleanup = () => {
    if (_allRows) _allRows.forEach(r => r.classList.remove('dragging', 'drag-over'));
    dragIdx = -1; dragOverRow = null; _allRows = null;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointerleave', cleanup);
    container.removeEventListener('selectstart', prevent);
  };
  const onMove = e => {
    if (dragIdx === -1) return;
    e.preventDefault();
    const over = getRowAt(e.clientY);
    if (over && parseInt(over.dataset[dataAttr]) !== dragIdx && over !== dragOverRow) {
      if (dragOverRow) dragOverRow.classList.remove('drag-over');
      over.classList.add('drag-over'); dragOverRow = over;
    }
  };
  const onUp = () => {
    if (dragOverRow && dragIdx !== -1) {
      const tgt = parseInt(dragOverRow.dataset[dataAttr]);
      if (tgt !== dragIdx) onReorder(dragIdx, tgt);
    }
    cleanup();
  };
  const onDown = e => {
    const row = e.target.closest(rowSel);
    if (!row) return;
    dragIdx = parseInt(row.dataset[dataAttr]);
    _allRows = Array.from(container.querySelectorAll(rowSel));
    row.classList.add('dragging');
    container.addEventListener('selectstart', prevent);
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointerleave', cleanup);
  };
  container.addEventListener('pointerdown', onDown);
  container._dragCleanup = () => { cleanup(); container.removeEventListener('pointerdown', onDown); };
}

    showToast('分组已删除', 'success');

function loadStorage() {
  try {
    const s1 = localStorage.getItem('fund_monitor_v3');

        if (f.operations === undefined) f.operations = [];

          if (f.amount > 0) {
            f.cost = f.amount / f.shares;

        }
        delete f._lastAccumJzrq;
        // 每次打开默认3个月
        f._chartPeriod = 3;

async function calcSharesFromPurchaseDate(fund, purchaseDate, isUpdated) {
  if (!fund) return;
  await fetchFundHistory(fund.code);
  if (!fund.name) await fetchFundData(fund.code);
  fund.isQDII = !!(fund.name||'').toUpperCase().includes('QDII');
  const history = fund.history;
  if (!history || !history.length) return;

  const historyTradeDays = history.map(d => new Date(d.date + 'T00:00:00').getTime()).sort((a,b) => a - b);
  const historyLatest = historyTradeDays[historyTradeDays.length - 1];
  const purchaseTime = new Date(purchaseDate).getTime();

  // 规则一：填的日期不在净值列表里 → 强制按已更新（复选框无效）
  const inHistory = historyTradeDays.includes(purchaseTime);
  const baseOffset = inHistory ? (isUpdated ? 0 : 1) : 0;

  // 规则二：QDII多退一天，但只在填的日期 ≤ 最新净值日时叠加（数据已齐全才需要补偿）
  const qdiiOffset = (fund.isQDII && purchaseTime <= historyLatest) ? 1 : 0;

  let targetTime;

  if (inHistory) {
    let offset = baseOffset + qdiiOffset;
    targetTime = purchaseTime;
    while (offset > 0) {
      const idx = historyTradeDays.indexOf(targetTime);
      if (idx > 0) { targetTime = historyTradeDays[idx - 1]; } else break;
      offset--;
    }
  } else {
    const nearestTradeDay = historyTradeDays.filter(t => t <= purchaseTime).pop() || historyTradeDays[0];
    let offset = baseOffset + qdiiOffset;
    targetTime = nearestTradeDay;
    while (offset > 0) {
      const idx = historyTradeDays.indexOf(targetTime);
      if (idx > 0) { targetTime = historyTradeDays[idx - 1]; } else break;
      offset--;
    }
  }

  const purchaseData = history.find(d => new Date(d.date + 'T00:00:00').getTime() === targetTime);
  if (purchaseData) {
    const purchaseNav = purchaseData.value;
    const marketValBase = (fund._origMarketVal || fund.amount || 0);
    const principal = fund.amount || 0;
    fund.shares = marketValBase / purchaseNav;
    fund.cost = fund.shares > 0 ? (principal / fund.shares) : purchaseNav;
    fund.calibrateTime = purchaseNav;
    fund.purchaseDate = purchaseData.date;
    fund._origMarketVal = principal;
  }
}

  if(cleanCode.length<4||cleanCode.length>6){ showToast('请输入4-6位基金代码','error'); ci.focus(); ci.select(); return; }

  const fundObj = createFundObj(cleanCode, amount, profitInput, marketAmount, purchaseDate);
  if (sectorInput) fundObj.sectors = [sectorInput];
  const ex=funds.find(f=>f.code===cleanCode);
  const needCalc = purchaseDate <= todayStr();

  if(ex){
    showConfirm(`已存在 ${ex.name||cleanCode}（本金 ${formatMoney(ex.amount)}）\n覆盖为新数据？（本金 ${formatMoney(amount)}）`,async ()=>{
      const idx=funds.indexOf(ex);
      if(idx>=0) funds.splice(idx,1);
      funds.push(fundObj);
      if(needCalc){
        showToast('正在获取历史净值...', 'warning');
        await calcSharesFromPurchaseDate(fundObj, purchaseDate, isUpdated);
      }
      saveFunds(); renderFunds(); fetchFundData(cleanCode);
      showToast('已覆盖','success'); closeAddPanel();
    });
    return;
  }
  funds.push(fundObj);
  if(needCalc){
    showToast('正在获取历史净值...', 'warning');
    await calcSharesFromPurchaseDate(fundObj, purchaseDate, isUpdated);
  }
  saveFunds(); renderFunds(); fetchFundData(cleanCode);
  expandedCode=cleanCode; openFundDetailModal(cleanCode);
  showToast('已添加：'+cleanCode,'success'); closeAddPanel();
}

function toggleSort(field) { if (sortField === field) sortDir = -sortDir; else { sortField = field; sortDir = -1; } updateSortUI(); renderFunds(); }
function updateSortUI() {
  document.querySelectorAll('.lh-sort').forEach(el => {
    el.classList.remove('asc','desc');
    if (el.dataset.field === sortField) el.classList.add(sortDir===1?'asc':'desc');
  });
}
function getSortedFunds() {
  const base = getGroupFunds();
  if (!sortField) return base.slice();
  const arr = base.slice();
  arr.sort((a,b) => {
    let va,vb;
    if (sortField === 'name') {
      va = getMarketValue(a);
      vb = getMarketValue(b);
    }
    else if (sortField === 'gszzl') {
      const aOpen=isMarketOpenNow(a), bOpen=isMarketOpenNow(b);
      va=calcTodayProfit(a,aOpen); vb=calcTodayProfit(b,bOpen);
    }
    else if (sortField === 'amount') {
      const aDwjz=parseFloat(a.dwjz)||0, aVdwjz=parseFloat(a._valuationDwjz)||0;
      const bDwjz=parseFloat(b.dwjz)||0, bVdwjz=parseFloat(b._valuationDwjz)||0;
      let aRate=parseFloat(a.gszzl)||0, bRate=parseFloat(b.gszzl)||0;
      if(aDwjz>0&&aVdwjz>0&&Math.abs(aDwjz-aVdwjz)>0.0001) aRate=((aDwjz-aVdwjz)/aVdwjz)*100;
      if(bDwjz>0&&bVdwjz>0&&Math.abs(bDwjz-bVdwjz)>0.0001) bRate=((bDwjz-bVdwjz)/bVdwjz)*100;
      va=aRate; vb=bRate;
    }
    else if (sortField === 'profit') {
      const aOpen=isMarketOpenNow(a), bOpen=isMarketOpenNow(b);
      va=calcDisplayProfit(a, aOpen); vb=calcDisplayProfit(b, bOpen);
    }
    if (va<vb) return -sortDir; if (va>vb) return sortDir; return 0;
  });
  return arr;
}

function openBatchPanel(){document.getElementById('batchPanel').classList.add('active');}
function closeBatchPanel(){document.getElementById('batchPanel').classList.remove('active');}
function importBatchFunds(){
  if(!Array.isArray(funds)){ funds=[]; }
  const ta=document.getElementById('batchInput'), lines=ta.value.trim().split('\n');
  let added=0, updated=0, errs=[];
  const isUpdated = document.getElementById('batchIsUpdated')?.checked ?? true;
  lines.forEach((line,i)=>{
    line=line.trim(); if(!line)return;
    const p=line.split(/\s+/);
    let code=p[0].replace(/\D/g,'');
    const marketAmount=parseFloat(p[1])||0;
    let profitInput=null, purchaseDate=todayStr();
    if(p.length===3){
      if(p[2].includes('-')){ purchaseDate=p[2]; }
      else { profitInput=parseFloat(p[2]); }
    } else if(p.length>=4){
      profitInput=parseFloat(p[2]); purchaseDate=p[3];
    }
    const sectorName = p.length >= 5 ? p[4] : '';
    const amount=marketAmount-(profitInput||0);
    if(code.length===5) code='0'+code;
    else if(code.length===4) code='00'+code;
    if(!/^\d{6}$/.test(code)){errs.push(`第${i+1}行`); return;}
    const ex=funds.find(f=>f.code===code);
    const fundObj = createFundObj(code, amount, profitInput, marketAmount, purchaseDate, null, false);
    if (sectorName) fundObj.sectors = [sectorName];
    if(ex){
      const idx=funds.indexOf(ex); if(idx>=0) funds.splice(idx,1);
      funds.push(fundObj); updated++;
    } else {
      funds.push(fundObj); added++;
    }
  });
  if(errs.length){showToast(`错误：${errs.join(',')}`,'warning');}
  else if(!added&&!updated){showToast('无数据','warning');}
  else {
    showToast('正在计算...', 'warning');
    saveFunds(); closeBatchPanel(); ta.value='';
    const today = todayStr();
    (async () => {
      const pending = funds.filter(f => !f._tnCalculated && f.purchaseDate && f.purchaseDate <= today);
      for (const f of pending) {
        try { await calcSharesFromPurchaseDate(f, f.purchaseDate, isUpdated); } catch {}
      }
      saveFunds(); renderFunds();
      showToast(`成功：新增${added},更新${updated}`,'success');
      refreshAll();
    })();
  }
}

function saveHoldingModify(code){
  const f = funds.find(x => x.code === code);
  if (!f) return;
  const nav = parseFloat(f.dwjz) || parseFloat(f.gsz) || 0;
  if (nav <= 0) { showToast('净值未获取，无法修改', 'error'); return; }
  const mode = document.getElementById('holdEditPanel_'+code)?.dataset?.holdMode || 'amount';
  if (mode === 'share') {
    const elShare = document.getElementById('modalShares');
    const elCost = document.getElementById('modalCost');
    const newShare = parseFloat(elShare?.value);
    const newCost = parseFloat(elCost?.value);
    if (isNaN(newShare) || newShare <= 0) { showToast('请输入有效份额', 'error'); return; }
    if (isNaN(newCost) || newCost <= 0) { showToast('请输入有效成本价', 'error'); return; }
    f.shares = newShare;
    f.cost = newCost;
    f.amount = r2(f.cost * f.shares);
  } else {
    const elAmount = document.getElementById('modalMarketVal');
    const elProfit = document.getElementById('modalProfit');
    const newAmount = parseFloat(elAmount?.value);
    const newProfit = parseFloat(elProfit?.value);
    if (isNaN(newAmount) || newAmount <= 0) { showToast('请输入有效金额', 'error'); return; }
    const profit = isNaN(newProfit) ? 0 : newProfit;
    f.shares = newAmount / nav;
    f.cost = f.shares > 0 ? ((newAmount - profit) / f.shares) : 0;
    f.amount = r2(f.cost * f.shares);
  }
  saveFunds(); renderFunds();
  showToast('持仓已更新', 'success');
}

// FundBase JSONP
function fetchFundBaseFirst(code, doResolve){
  const cb='fb_first_'+code+'_'+Date.now();
  const sc=document.createElement('script');
  const t=setTimeout(()=>{cleanup();console.warn(`[FundBase超时] ${code}`);doResolve(null);},JSONP_TIMEOUT);
  function cleanup(){clearTimeout(t);delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);}
  window[cb]=resp=>{
    cleanup();
    try{
      if(!resp||!resp.Datas){ doResolve(null); return; }
      const d=resp.Datas;
      const f=funds.find(x=>x.code===code);
      if(!f){doResolve(null);return;}
      let valData=null;
      if(d.Valuation){ try{valData=JSON.parse(d.Valuation);}catch(e){} }
      if(valData && valData.dwjz && parseFloat(valData.dwjz)>0){
        f._valuationDwjz=String(valData.dwjz);
      }
      if(valData && valData.jzrq){
        f._valuationJzrq=String(valData.jzrq);
      }
      const latestNav=d.DWJZ; const latestDate=d.FSRQ; const latestChange=d.RZDF;
      if(d.SHORTNAME) f.name=d.SHORTNAME;
      const isQDII = (f.name||'').toUpperCase().includes('QDII');
      if(isQDII) f.isQDII=true; else delete f.isQDII;

      if(valData && valData.dwjz && parseFloat(valData.dwjz)>0){
        f._prevDwjz=String(valData.dwjz);
      } else {
        const oldDwjz=parseFloat(f.dwjz)||0;
        if(oldDwjz>0) f._prevDwjz=String(oldDwjz);
      }
      f.dwjz=latestNav; f.jzrq=latestDate;
      if(valData && valData.gsz && parseFloat(valData.gsz)>0){
        f.gsz=valData.gsz; f.gszzl=valData.gszzl||'0'; f.gztime=valData.gztime||'';
      } else {
        if(latestChange!==undefined&&latestChange!=='') f.gszzl=String(latestChange);
        f.gsz=latestNav; f.gztime=latestDate;
      }

      if(f.totalProfit!==null && f.calibrateTime===null) f.calibrateTime=parseFloat(f.dwjz)||null;

      doResolve({fundcode:code});
    }catch(e){ doResolve(null); }
  };
  sc.src=`https://fundmobapi.eastmoney.com/FundMApi/FundBase.ashx?FCODE=${code}&deviceid=1&plat=Iphone&product=EFund&version=6.3.5&callback=${cb}`;
  sc.onerror=()=>{ cleanup(); doResolve(null); };
  document.head.appendChild(sc);
}

// ============ 指数基金指数验证 ============
const fundIndexMap={ '161725':'sz399997', '001186':'sz399006' };

function fetchIndexQuote(indexCode){
  return new Promise(resolve=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',`https://qt.gtimg.cn/q=${indexCode}`,true);
    xhr.onerror=()=>resolve(null); xhr.timeout = XHR_TIMEOUT; xhr.ontimeout=()=>resolve(null);
    xhr.onload=()=>{
      if(xhr.status!==200){resolve(null);return;}
      const txt=xhr.responseText||''; const m=txt.match(/"([^"]+)"/);
      if(!m){resolve(null);return;}
      const parts=m[1].split('~');
      if(!parts||parts.length<6){resolve(null);return;}
      const name=parts[1]||''; const latest=parseFloat(parts[3])||0; const prev=parseFloat(parts[4])||0;
      const change=prev>0?((latest-prev)/prev*100).toFixed(2):'0.00';
      resolve({name,latest,prev,change});
    };
    xhr.send();
  });
}

  const fundChange=parseFloat(fund.gszzl)||0; const indexChange=parseFloat(data.change)||0;
  const diff=(fundChange-indexChange).toFixed(2); const diffClass=Math.abs(diff)>0.5?'warning':'';
  container.innerHTML=`<div class="index-ref ${diffClass}">

// ====== 历史净值：pingzhongdata 全量数据（与 real-time-fund 一致，一次请求，无需分页） ======
const HISTORY_CACHE_KEY = 'fund_history_cache_v2';
const HISTORY_CACHE_TTL = 60 * 60 * 1000;
const HISTORY_STALE_TTL = 10 * 60 * 1000;
const HISTORY_CACHE_MAX = 50; // LRU max entries

function _readHistoryCache() {
  try { return JSON.parse(localStorage.getItem(HISTORY_CACHE_KEY) || '{}'); } catch (e) { return {}; }
}

function getHistoryCache(code) {
  const entry = _readHistoryCache()[code];
  if (entry && Date.now() - entry.ts < HISTORY_CACHE_TTL) return entry.data;
  return null;
}

function getHistoryCacheStale(code) {
  const entry = _readHistoryCache()[code];
  return entry ? { data: entry.data, ts: entry.ts } : null;
}

function setHistoryCache(code, data) {
  try {
    const cache = _readHistoryCache();
    cache[code] = { ts: Date.now(), data };
    // LRU eviction: keep only the most recent HISTORY_CACHE_MAX entries
    const keys = Object.keys(cache);
    if (keys.length > HISTORY_CACHE_MAX) {
      keys.sort((a, b) => cache[a].ts - cache[b].ts);
      for (let i = 0; i < keys.length - HISTORY_CACHE_MAX; i++) delete cache[keys[i]];
    }
    localStorage.setItem(HISTORY_CACHE_KEY, JSON.stringify(cache));
  } catch (e) {}
}


// 后台刷新防重
const _histRefreshing = new Set();

// 一次 JSONP 请求获取基金全部历史净值（pingzhongdata/{code}.js）
function _doFetchHistory(code){
  return new Promise(resolve => {
    const sc = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, JSONP_TIMEOUT);
    function cleanup() {
      clearTimeout(t);
      if (sc.parentNode) sc.parentNode.removeChild(sc);
    }
    sc.onload = () => {
      cleanup();
      try {
        const trend = window.Data_netWorthTrend;
        if (!Array.isArray(trend) || !trend.length) { resolve(null); return; }
        const now = new Date();
        const endMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).getTime();
        const history = trend
          .filter(d => d && typeof d.x === 'number' && Number.isFinite(Number(d.y)) && d.x <= endMs)
          .sort((a, b) => a.x - b.x)
          .map(d => {
            const dt = new Date(Number(d.x));
            const date = formatDate(dt);
            return { date, value: Number(d.y) };
          });
        resolve(history.length ? history : null);
      } catch (e) { resolve(null); }
    };
    sc.onerror = () => { cleanup(); resolve(null); };
    sc.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?v=${Date.now()}`;
    document.head.appendChild(sc);
  });
}

// JSONP 脚本注入（用于东方财富 F10 / FundArchives 接口，返回 window.apidata）
function _runF10Script(url, timeoutMs = 10000) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = url;
    script.async = true;
    let done = false;
    const cleanup = () => {
      done = true;
      if (timer) clearTimeout(timer);
      if (document.body.contains(script)) document.body.removeChild(script);
    };
    const timer = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve({ ok: false, error: '请求超时' });
    }, timeoutMs);
    script.onload = () => {
      if (done) return;
      cleanup();
      let apidata;
      try { apidata = window?.apidata ? JSON.parse(JSON.stringify(window.apidata)) : undefined; }
      catch (e) { apidata = window?.apidata; }
      resolve({ ok: true, apidata });
    };
    script.onerror = () => {
      if (done) return;
      cleanup();
      resolve({ ok: false, error: '数据加载失败' });
    };
    document.body.appendChild(script);
  });
}

function fetchFundHistory(code){
  return new Promise(async resolve => {
    const f = funds.find(x => x.code === code);
    if (f && f.history) { resolve(f.history); return; }

    // stale-while-revalidate：先返回 localStorage 缓存，过期则后台刷新
    const stale = getHistoryCacheStale(code);
    if (stale) {
      if (f) f.history = stale.data;
      resolve(stale.data);
      if (Date.now() - stale.ts >= HISTORY_STALE_TTL && !_histRefreshing.has(code)) {
        _histRefreshing.add(code);
        _doFetchHistory(code).then(newData => {
          if (newData) {
            const f2 = funds.find(x => x.code === code);
            if (f2) f2.history = newData;
            setHistoryCache(code, newData);
            // 更新弹窗内图表
            const canvas = document.querySelector('#fundDetailModal .trend-chart');
            if (canvas && expandedCode === code) {
              canvas._history = newData;
              const period = parseInt(canvas.dataset.period) || 90;
              const costNav = _costNav(f2);
              const oldChart = Chart.getChart(canvas);
              if (oldChart) oldChart.destroy();
              canvas._chart = createTrendChart(canvas, newData, period, costNav);
            }
            // 更新弹窗内历史净值 tab
            const historyPanel = document.querySelector('#fundDetailModal .tab-panel-history');
            if (historyPanel && historyPanel.dataset.loaded === 'true') {
              const rows = _buildHistoryRows(newData);
              _renderHistoryMiniTable(historyPanel, rows);
              historyPanel._allRows = rows;
            }
          }
        }).finally(() => _histRefreshing.delete(code));
      }
      return;
    }

    // 无缓存：一次请求拿全部历史数据
    const allHistory = await _doFetchHistory(code);
    if (!allHistory) { resolve(null); return; }
    const f2 = funds.find(x => x.code === code);
    if (f2) f2.history = allHistory;
    setHistoryCache(code, allHistory);
    resolve(allHistory);
  });
}

// ============ 单日净值查询（lsjz 接口，更新快）============
function fetchFundNetValue(code, date) {
  return new Promise(resolve => {
    const sc = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, 10000);
    let done = false;
    function cleanup() { if (done) return; done = true; clearTimeout(t); if (sc.parentNode) sc.parentNode.removeChild(sc); }
    sc.onload = () => {
      cleanup();
      try {
        const resp = window.apidata;
        const content = resp?.content || '';
        if (content.includes('暂无数据')) { resolve(null); return; }
        const rows = content.split('<tr>');
        for (const row of rows) {
          const cells = row.match(/<td[^>]*>(.*?)<\/td>/g) || [];
          if (cells.length < 2) continue;
          const d = cells[0].replace(/<[^>]+>/g, '').trim();
          if (d !== date) continue;
          const nav = parseFloat(cells[1].replace(/<[^>]+>/g, ''));
          resolve(Number.isFinite(nav) ? nav : null);
          return;
        }
        resolve(null);
      } catch(e) { resolve(null); }
    };
    sc.onerror = () => { cleanup(); resolve(null); };
    sc.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=1&per=1&sdate=${date}&edate=${date}`;
    document.head.appendChild(sc);
  });
}

// 从 startDate 开始逐日往后查，最多30天或到今天为止，返回第一个有净值的 { date, value }
async function fetchSmartNetValue(code, startDate) {
  const d = new Date(startDate);
  const today = formatDate(new Date());
  for (let i = 0; i < 30; i++) {
    const ds = d.toISOString().slice(0, 10);
    if (ds > today) break;
    const nav = await fetchFundNetValue(code, ds);
    if (nav !== null) return { date: ds, value: nav };
    d.setDate(d.getDate() + 1);
  }
  return null;
}

const HOLDINGS_CACHE_KEY = 'fund_holdings_cache_v2';
const HOLDINGS_CACHE_TTL = 6 * 60 * 60 * 1000; // 6 小时，持仓每季度才变

function getHoldingsCache(code) {
  try {
    const cache = JSON.parse(localStorage.getItem(HOLDINGS_CACHE_KEY) || '{}');
    const entry = cache[code];
    if (entry && Date.now() - entry.ts < HOLDINGS_CACHE_TTL) return entry.data;

}

function setHoldingsCache(code, data) {
  try {
    const cache = JSON.parse(localStorage.getItem(HOLDINGS_CACHE_KEY) || '{}');
    cache[code] = { ts: Date.now(), data };
    // 限制缓存条目

// 从 F10 HTML 中提取报告期日期（照抄 fund.js L365-375）
function extractHoldingsReportDate(html) {
  if (!html) return null;
  const m1 = html.match(/(报告期|截止日期)[^0-9]{0,20}(\d{4}-\d{2}-\d{2})/);
  if (m1) return m1[2];
  const m2 = html.match(/(\d{4}-\d{2}-\d{2})/);
  return m2 ? m2[1] : null;
}

// 判断报告期是否为上一季度（照抄 fund.js L377-387，用原生 Date 替代 dayjs）
function isLastQuarterReport(reportDateStr) {
  if (!reportDateStr) return false;
  const parts = reportDateStr.split('-');
  const r = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  if (isNaN(r.getTime())) return false;
  const now = new Date();
  const sixMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate());
  return r > sixMonthsAgo;
}

// 从 HTML 中解析前10持仓（股票名称、占净值比例）
function parseHoldingsFromHtml(html) {
  if (!html || typeof html !== 'string') return null;

  // 解析 thead 找列索引（照抄 real-time-fund fund.js L654-662）
  const headerRow = (html.match(/<thead[\s\S]*?<tr[\s\S]*?<\/tr>[\s\S]*?<\/thead>/i) || [])[0] || '';
  const headerCells = (headerRow.match(/<th[\s\S]*?>([\s\S]*?)<\/th>/gi) || []).map(th => th.replace(/<[^>]*>/g, '').trim());
  let idxCode = -1, idxName = -1, idxWeight = -1;
  headerCells.forEach((h, i) => {
    const t = h.replace(/\s+/g, '');
    if (idxCode < 0 && (t.includes('股票代码') || t.includes('证券代码'))) idxCode = i;
    if (idxName < 0 && (t.includes('股票名称') || t.includes('证券名称'))) idxName = i;
    if (idxWeight < 0 && (t.includes('占净值比例') || t.includes('占比'))) idxWeight = i;
  });

  // 解析 tbody 中的行
  const rows = html.match(/<tbody[\s\S]*?<\/tbody>/i) || [];
  const dataRows = rows.length ? rows[0].match(/<tr[\s\S]*?<\/tr>/gi) || [] : html.match(/<tr[\s\S]*?<\/tr>/gi) || [];

  const holdings = [];
  for (const r of dataRows) {
    if (holdings.length >= 10) break;
    const tds = (r.match(/<td[\s\S]*?>([\s\S]*?)<\/td>/gi) || []).map(td => td.replace(/<[^>]*>/g, '').trim());
    if (!tds.length) continue;

    let hc = '', hn = '', hw = '';
    // 代码解析（照抄 fund.js L671-681）：支持6位A股、5位港股、英文代码
    if (idxCode >= 0 && tds[idxCode]) {
      const raw = String(tds[idxCode] || '').trim();
      const mA = raw.match(/(\d{6})/);
      const mHK = raw.match(/(\d{5})/);
      const mAlpha = raw.match(/\b([A-Za-z]{1,10})\b/);
      hc = mA ? mA[1] : (mHK ? mHK[1] : (mAlpha ? mAlpha[1].toUpperCase() : raw));
    } else {
      const codeIdx = tds.findIndex(txt => /^\d{6}$/.test(txt));
      if (codeIdx >= 0) hc = tds[codeIdx];
    }
    // 名称解析（照抄 fund.js L682-687）：有兜底按位置推断
    if (idxName >= 0 && tds[idxName]) {
      hn = tds[idxName];
    } else if (hc) {
      const i = tds.findIndex(txt => txt && txt !== hc && !/%$/.test(txt));
      hn = i >= 0 ? tds[i] : '';
    }
    // 权重解析（照抄 fund.js L688-694）：有兜底找含%的列
    if (idxWeight >= 0 && tds[idxWeight]) {
      const wm = tds[idxWeight].match(/([\d.]+)\s*%/);
      hw = wm ? `${wm[1]}%` : tds[idxWeight];
    } else {
      const wIdx = tds.findIndex(txt => /\d+(?:\.\d+)?\s*%/.test(txt));
      hw = wIdx >= 0 ? tds[wIdx].match(/([\d.]+)\s*%/)?.[1] + '%' : '';
    }

    if (hc || hn || hw) {
      holdings.push({ code: hc, name: hn, weight: hw, change: null });
    }
  }
  return holdings.length ? holdings : null;
}

// 股票代码 → 腾讯行情代码格式
function _normalizeTencentCode(input) {
  const raw = String(input || '').trim();
  if (!raw) return null;
  const mPref = raw.match(/^(us|hk|sh|sz|bj)(.+)$/i);
  if (mPref) {
    const p = mPref[1].toLowerCase();
    const rest = String(mPref[2] || '').trim();
    return `${p}${/^\d+$/.test(rest) ? rest : rest.toUpperCase()}`;
  }
  if (/^\d{6}$/.test(raw)) {
    const pfx = raw.startsWith('6') || raw.startsWith('9') ? 'sh' : (raw.startsWith('4') || raw.startsWith('8') ? 'bj' : 'sz');
    return `s_${pfx}${raw}`;
  }
  if (/^\d{5}$/.test(raw)) return `s_hk${raw}`;
  const mHkDot = raw.match(/^(\d{4,5})\.(?:HK)$/i);
  if (mHkDot) return `s_hk${mHkDot[1].padStart(5, '0')}`;
  if (/^[A-Za-z]{1,10}$/.test(raw)) return `us${raw.toUpperCase()}`;
  return null;
}

// 通过腾讯行情 JSONP 拉取涨跌幅（照抄 fund.js L752-805）
function enrichHoldingsWithQuotes(holdings) {
  const needQuotes = holdings
    .map(h => ({ h, tcode: _normalizeTencentCode(h.code) }))
    .filter(x => Boolean(x.tcode));
  if (!needQuotes.length) return Promise.resolve();

  const tencentCodes = needQuotes.map(x => x.tcode).join(',');
  const quoteUrl = `https://qt.gtimg.cn/q=${tencentCodes}`;

  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = quoteUrl;
    let done = false;
    const cleanup = () => {
      done = true;
      if (timer) clearTimeout(timer);
      if (document.body.contains(script)) document.body.removeChild(script);
    };
    const timer = setTimeout(() => { if (!done) { cleanup(); resolve(); } }, 8000);
    script.onload = () => {
      if (done) return;
      needQuotes.forEach(({ h, tcode }) => {
        const varName = `v_${tcode}`;
        const dataStr = window[varName];
        if (dataStr) {
          const parts = dataStr.split('~');
          const isUS = /^us/i.test(String(tcode || ''));
          const idx = isUS ? 32 : 5;
          if (parts.length > idx) {
            h.change = parseFloat(parts[idx]);
          }
        }
      });
      cleanup();
      resolve();
    };
    script.onerror = () => { cleanup(); resolve(); };
    document.body.appendChild(script);
  });
}

async function fetchFundHoldings(code) {
  const fund = funds.find(f => f.code === code);
  if (fund && fund._holdings) return fund._holdings;

  const cached = getHoldingsCache(code);
  if (cached) {
    if (fund) fund._holdings = cached;
    return cached;
  }

  const url = `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&code=${code}&topline=10&year=&month=&_=${Date.now()}`;
  const r = await _runF10Script(url);
  if (!r?.ok) return null;
  const html = r.apidata?.content || '';
  const reportDate = extractHoldingsReportDate(html);
  if (!isLastQuarterReport(reportDate)) return null;
  const holdings = parseHoldingsFromHtml(html);
  if (holdings && holdings.length) {
    await enrichHoldingsWithQuotes(holdings);
    if (fund) fund._holdings = holdings;
    setHoldingsCache(code, holdings);
  }
  return holdings;
}

// 把原始历史数据转为表格行（日期降序，计算日涨幅），照抄 FundHistoryNetValue.jsx buildRows
function _buildHistoryRows(history) {
  if (!Array.isArray(history) || history.length === 0) return [];
  const reversed = [...history].reverse();
  return reversed.map((item, i) => {
    const prev = reversed[i + 1];
    let dailyChange = null;
    if (prev && Number.isFinite(item.value) && Number.isFinite(prev.value) && prev.value !== 0) {
      dailyChange = ((item.value - prev.value) / prev.value) * 100;
    }
    return { date: item.date, netValue: item.value, dailyChange };
  });
}

// 格式化为 YY-MM-DD（入参已是 YYYY-MM-DD 字符串）
function _fmtDate(d) { return d.slice(2); }

// 渲染历史净值 mini 表（5行 + 加载更多按钮）
function _fmtChangeCell(r) {
  if (r.dailyChange != null && Number.isFinite(r.dailyChange)) {
    const sign = r.dailyChange > 0 ? '+' : '';
    const cls = r.dailyChange > 0 ? 'up' : r.dailyChange < 0 ? 'down' : '';
    return `<span class="${cls}">${sign}${r.dailyChange.toFixed(2)}%</span>`;
  }
  return '—';
}
function _renderHistoryRow(r) {
  return `<tr>
    <td style="text-align:left;">${_fmtDate(r.date)}</td>
    <td style="text-align:center;">${Number.isFinite(r.netValue) ? r.netValue.toFixed(4) : '—'}</td>
    <td style="text-align:right;" class="${r.dailyChange > 0 ? 'up' : r.dailyChange < 0 ? 'down' : ''}">${_fmtChangeCell(r)}</td>
  </tr>`;
}
function _renderHistoryMiniTable(container, rows) {
  if (!rows.length) { container.innerHTML = '<div class="holding-empty">暂无历史净值</div>'; return; }
  const visible = rows.slice(0, 15);
  let html = `<table class="history-mini-table"><thead><tr>
    <th style="text-align:left;">日期</th><th style="text-align:center;">净值</th><th style="text-align:right;">日涨幅</th>
  </tr></thead><tbody>`;
  visible.forEach(r => { html += _renderHistoryRow(r); });
  html += '</tbody></table>';
  if (rows.length > 5) {
    html += `<div style="margin-top:8px;display:flex;justify-content:center;">
      <button type="button" class="muted" style="font-size:12px;padding:0;border:none;background:none;cursor:pointer;"
        onclick="_showHistoryModal(this)">加载更多历史净值</button></div>`;
  }
  container.innerHTML = html;
  container._allRows = rows;
}
