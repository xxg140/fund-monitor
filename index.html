// 自定义 plugin：买卖标记 + 十字线
const _trendPlugin = {
  id: 'trendMarkersCrosshair',
  afterDraw(chart) {
    const { ctx, chartArea, scales: { x: xSc, y: ySc } } = chart;
    if (!chartArea) return;
    const { top, bottom, left, right } = chartArea;
    const isDark = document.body.classList.contains('dark');

    // 买卖标记
    if (chart._markers && chart._markers.length) {
      chart._markers.forEach(m => {
        const px = xSc.getPixelForValue(m.x);
        const py = ySc.getPixelForValue(m.y);
        if (px >= left && px <= right && py >= top && py <= bottom) {
          ctx.fillStyle = m.type === 'add' ? '#ef4444' : '#22c55e';
          ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = isDark ? '#0f172a' : '#ffffff';
          ctx.lineWidth = 0.8; ctx.stroke();
        }
      });
    }

    // 十字线
    if (chart._ch && chart._ch.active) {
      const { idx } = chart._ch;
      const raw = chart._rawData;
      if (idx == null || idx < 0 || !raw || idx >= raw.length) return;
      const dataX = xSc.getPixelForValue(idx);
      const dataY = ySc.getPixelForValue(raw[idx].value);
      ctx.save();
      ctx.strokeStyle = isDark ? 'rgba(148,163,184,0.7)' : 'rgba(71,85,105,0.7)';
      ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
      ctx.beginPath(); ctx.moveTo(dataX, top); ctx.lineTo(dataX, bottom); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = isDark ? '#f1f5f9' : '#0f172a';
      ctx.beginPath(); ctx.arc(dataX, dataY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = isDark ? '#1e293b' : '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(dataX, dataY, 4, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    // 成本线（plugin 画保证在最上层）
    if (chart._costNav != null) {
      const costY = ySc.getPixelForValue(chart._costNav);
      if (costY >= top && costY <= bottom) {
        ctx.save();
        ctx.strokeStyle = isDark ? '#f59e0b' : '#d97706';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(left, costY);
        ctx.lineTo(right, costY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = isDark ? '#f59e0b' : '#d97706';
        ctx.font = '9px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText('成本 ' + chart._costNav.toFixed(4), right - 2, costY - 4);
        ctx.restore();
      }
    }
  }
};

// 创建 / 重建趋势图
function createTrendChart(canvas, data, period, costNav) {
  if (!canvas || !data || !data.length) return null;
  period = period || parseInt(canvas.dataset.period) || 1;

  const code = canvas.dataset.code;
  const fund = funds.find(f => f.code === code);

  // 用数据最新日期计算截止日期
  const latestDate = data[data.length - 1].date;
  const [ly, lm, ld] = latestDate.split('-').map(Number);
  const cutoffBase = new Date(ly, lm - 1, ld);
  cutoffBase.setMonth(cutoffBase.getMonth() - period);
  const cutoffDate = formatDate(cutoffBase);

  let baseIdx = 0;
  for (let i = data.length - 1; i >= 0; i--) { if (data[i].date <= cutoffDate) { baseIdx = i; break; } }
  const baseNav = data[baseIdx]?.value || 0;
  if (baseNav <= 0) return null;

  const recent = data.slice(baseIdx).filter(d => d && d.value > 0);
  if (recent.length < 2) return null;
  if (!costNav || isNaN(costNav) || costNav <= 0) {
    const vals = recent.map(d => d.value);
    costNav = (Math.min(...vals) + Math.max(...vals)) / 2;
  }
  // 以起始净值为基准计算对称Y轴范围
  const navs = recent.map(d => d.value);
  const baseVal = navs[0];
  const pcts = navs.map(v => ((v - baseVal) / baseVal) * 100);
  const maxAbs = Math.max(Math.abs(Math.min(...pcts)), Math.abs(Math.max(...pcts)));
  const yHalf = (maxAbs / 100) * baseVal;

  // 本基金涨跌
  const lastPct = pcts[pcts.length - 1];
  const pctEl = document.querySelector(`.period-change[data-code="${code}"]`);
  if (pctEl) {
    const cl = lastPct >= 0 ? 'up' : 'down';
    pctEl.className = 'period-change';
    pctEl.innerHTML = `<span class="fund-label">本基金</span> <span class="fund-pct ${cl}">${lastPct >= 0 ? '+' : ''}${lastPct.toFixed(2)}%</span>`;
  }

  // X轴：日期标签
  const labels = recent.map(d => d.date.slice(2)); // "26-02-13"

  const isDark = document.body.classList.contains('dark');
  const lineColor = isDark ? '#94a3b8' : '#475569';
  const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';

  const config = {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          data: navs,
          borderColor: lineColor,
          backgroundColor: (ctx) => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.chartArea?.bottom || 200);
            g.addColorStop(0, isDark ? 'rgba(148,163,184,0.15)' : 'rgba(71,85,105,0.12)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            return g;
          },
          fill: 'start',
          pointRadius: 0,
          pointHoverRadius: 0,
          borderWidth: 1.5,
          tension: 0,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { left: 10, right: 10 } },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          type: 'category',
          offset: true,
          grid: { display: false, drawBorder: false },
          afterBuildTicks: function(axis) {
            var len = axis.chart.data.labels.length;
            var mid = Math.floor((len - 1) / 2);
            axis.ticks = [
              { value: 0, label: axis.chart.data.labels[0] },
              { value: mid, label: axis.chart.data.labels[mid] },
              { value: len - 1, label: axis.chart.data.labels[len - 1] },
            ];
          },
          ticks: { color: '#999', font: { size: 8 }, maxRotation: 0 },
          border: { display: false },
        },
        y: {
          display: true,
          position: 'left',
          afterFit: function(scale) { scale.width = 0; },
          grid: { color: gridColor, drawBorder: false, tickLength: 4 },
          ticks: { color: '#999', font: { size: 8 }, count: 5, mirror: true, callback: function(val) { return (((val - baseVal) / baseVal) * 100).toFixed(2) + '%'; } },
          border: { display: false },
          min: baseVal - yHalf,
          max: baseVal + yHalf,
        },
      },
    },
    plugins: [_trendPlugin],
  };

  // 销毁旧实例
  const old = Chart.getChart(canvas);
  if (old) old.destroy();

  const chart = new Chart(canvas.getContext('2d'), config);
  chart._rawData = recent;
  chart._baseVal = baseVal;
  chart._period = period;
  chart._costNav = costNav;

  // 买卖标记
  if (fund && fund.operations && fund.operations.length) {
    const ops = fund.operations.filter(op =>
      (op.type === 'add' || op.type === 'reduce') && op.status !== 'cancelled'
    );
    chart._markers = [];
    ops.forEach(op => {
      const opDateStr = op.date.slice(0, 10);
      let bestIdx = -1;
      for (let i = 0; i < recent.length; i++) {
        if (recent[i].date === opDateStr) { bestIdx = i; break; }
      }
      if (bestIdx >= 0) {
        chart._markers.push({ x: bestIdx, y: recent[bestIdx].value, type: op.type });
      }
    });
  }

  // 绑定十字线事件（先移除旧监听器防泄漏）
  canvas.removeEventListener('mousemove', _onTrendMouseMove);
  canvas.removeEventListener('mouseleave', _onTrendMouseLeave);
  canvas.removeEventListener('touchstart', _onTrendTouchStart);
  canvas.removeEventListener('touchmove', _onTrendTouchMove);
  canvas.removeEventListener('touchend', _onTrendTouchEnd);
  canvas.removeEventListener('click', _noopClick);
  canvas.addEventListener('mousemove', _onTrendMouseMove);
  canvas.addEventListener('mouseleave', _onTrendMouseLeave);
  canvas.addEventListener('touchstart', _onTrendTouchStart, { passive: false });
  canvas.addEventListener('touchmove', _onTrendTouchMove, { passive: false });
  canvas.addEventListener('touchend', _onTrendTouchEnd, { passive: false });
  canvas.addEventListener('click', _noopClick);

  chart.resize();
  chart.draw();
  return chart;
}

// ---- 十字线事件处理 ----
function _updateCrosshair(canvas, clientX) {
  const chart = Chart.getChart(canvas);
  if (!chart || !chart._rawData || !chart._rawData.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx = clientX - rect.left;
  const xSc = chart.scales.x;
  if (!xSc) return;
  const xVal = xSc.getValueForPixel(mx);
  const idx = Math.round(xVal);
  const raw = chart._rawData;
  if (idx < 0 || idx >= raw.length) return;
  chart._ch = { active: true, idx: idx };

  const dp = raw[idx];
  const code = canvas.dataset.code;
  const tooltip = document.getElementById('tooltip_' + code);
  if (tooltip && dp) {
    const pct = ((dp.value - chart._baseVal) / chart._baseVal) * 100;
    const dateStr = dp.date.slice(5);
    const label = `${dateStr}  ${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
    tooltip.textContent = label;
    const canvasRect = canvas.getBoundingClientRect();
    const parentRect = tooltip.parentElement.getBoundingClientRect();
    const offset = canvasRect.left - parentRect.left;
    let tLeft = mx + offset;
    const tw = tooltip.offsetWidth || 130;
    const cLeft = offset, cRight = offset + canvasRect.width;
    tLeft = Math.max(cLeft + tw / 2, Math.min(cRight - tw / 2, tLeft));
    tooltip.style.left = tLeft + 'px';
    tooltip.classList.add('visible');
  }
  chart.draw();
}

function _clearCrosshair(canvas) {
  const chart = Chart.getChart(canvas);
  if (chart) { chart._ch = { active: false }; chart.draw(); }
  const code = canvas.dataset.code;
  const tooltip = document.getElementById('tooltip_' + code);
  if (tooltip) tooltip.classList.remove('visible');
}

function _onTrendMouseMove(e) {
  const canvas = e.currentTarget;
  canvas._touchActive = false;
  _updateCrosshair(canvas, e.clientX);
}
function _onTrendMouseLeave(e) {
  _clearCrosshair(e.currentTarget);
}
function _noopClick(e) { e.stopPropagation(); }
function _onTrendTouchStart(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  canvas._touchActive = true;
  if (e.touches[0]) _updateCrosshair(canvas, e.touches[0].clientX);
}
function _onTrendTouchMove(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  if (!canvas._touchActive) return;
  if (e.touches[0]) _updateCrosshair(canvas, e.touches[0].clientX);
}
function _onTrendTouchEnd(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  canvas._touchActive = false;
  setTimeout(() => { if (!canvas._touchActive) _clearCrosshair(canvas); }, 1500);
}

// 图表数据缓存（localStorage，分时5min / 五日1h / K线6h）
const INDEX_CHART_CACHE_KEY = 'index_chart_cache';
const INDEX_CHART_TTL = { trend: 60*1000, trend5: 3*60*1000, day: 20*60*1000, week: 30*60*1000, month: 30*60*1000 };

function getIndexChartCache(code, period){
  try{
    const cache = JSON.parse(localStorage.getItem(INDEX_CHART_CACHE_KEY) || '{}');
    const entry = cache[code + '_' + period];
    if(entry){
      const ttl = INDEX_CHART_TTL[period] || INDEX_CHART_TTL.day;
      const fresh = Date.now() - entry.ts < ttl;

      return { data: entry.data, ts: entry.ts, fresh };
    }
  }catch(e){}
  return null;
}

function setIndexChartCache(code, period, data){
  try{
    const cache = JSON.parse(localStorage.getItem(INDEX_CHART_CACHE_KEY) || '{}');
    cache[code + '_' + period] = { ts: Date.now(), data };
    // 限制缓存条目数，保留最近30条
    const keys = Object.keys(cache);
    if(keys.length > 30){
      keys.sort((a,b)=>cache[b].ts-cache[a].ts);
      keys.slice(30).forEach(k=>delete cache[k]);
    }
    localStorage.setItem(INDEX_CHART_CACHE_KEY, JSON.stringify(cache));
  }catch(e){}
}

function fetchIndices(){
  if(!selectedIndices.length) return;
  
  // 构建代码映射和备选格式（美股需要多种格式尝试）
  const codeMap = {}; // tencentCode -> originalCode
  const altMap = {};  // originalCode -> [altTencentCodes]
  
  selectedIndices.forEach(code => {
    const info = allIndices.find(i => i.code === code);
    if (info) {
      codeMap[info.tencent] = code;
      // 美股添加备选格式
      if (code.startsWith('us')) {
        const suffix = code.slice(2).toLowerCase();
        const alts = ['us_' + suffix, 'gb_' + suffix, code];
        altMap[code] = alts;
        alts.forEach(alt => { if (!codeMap[alt]) codeMap[alt] = code; });
      }
    }
  });
  
  const codes = Object.keys(codeMap).join(',');
  const sc = document.createElement('script');
  sc.src = `https://qt.gtimg.cn/q=${codes}`;
  var timeout = setTimeout(function() {
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  }, XHR_TIMEOUT);
  sc.onload = function() {
    clearTimeout(timeout);
    Object.keys(codeMap).forEach(function(tcode) {
      var code = codeMap[tcode];
      if (indexDataCache[code] && indexDataCache[code].price > 0) return;

      var key = 'v_' + tcode;
      var raw = window[key];
      if (raw && typeof raw === 'string') {
        var parts = raw.split('~');
        if (parts.length >= 5) {
          var name = parts[1], price = parseFloat(parts[3]), prev = parseFloat(parts[4]);
          var open = parts.length > 5 ? (parseFloat(parts[5]) || 0) : 0;
          var high = parts.length > 33 ? (parseFloat(parts[33]) || 0) : 0;
          var low = parts.length > 34 ? (parseFloat(parts[34]) || 0) : 0;
          if (!isNaN(price) && !isNaN(prev) && price > 0) {
            var chg = ((price - prev) / prev * 100);
            indexDataCache[code] = { name: name, price: price, prev: prev, chg: chg, open: open, high: high, low: low };
          }
        }
      }
    });
    renderIndices();
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  };
  sc.onerror = function() { clearTimeout(timeout); if (sc.parentNode) sc.parentNode.removeChild(sc); };
  document.head.appendChild(sc);
}

    if (_indexDetailCode && _indexDetailPeriod) {
      const info2 = allIndices.find(i => i.code === _indexDetailCode);
      if (info2) fetchIndexData(info2, _indexDetailPeriod);
    } else {
      clearInterval(_indexRefreshTimer);
      _indexRefreshTimer = null;
    }
  }, AUTO_REFRESH_INTERVAL);
}

function closeIndexDetail() {
  _indexDetailCode = null;
  // 清除自动刷新定时器
  if (_indexRefreshTimer) {
    clearInterval(_indexRefreshTimer);
    _indexRefreshTimer = null;
  }
  document.getElementById('indexDetailModal').classList.remove('active');
}

function fetchIndexData(info, period) {
  const secid = info.secid || '';
  if (!secid || secid.startsWith('us')) {
    // 美股暂不支持K线图
    renderIndexStatic(info);
    return;
  }

  // stale-while-revalidate：先检查缓存
  const cached = getIndexChartCache(info.code, period);
  let hasCache = false;
  if (cached) {
    renderIndexChart(info, cached.data.rawData, period, cached.data.preClose, cached.data.trend5Base);
    hasCache = true;
    if (cached.fresh) return; // 缓存新鲜，跳过网络请求
  }

  // 港股不支持分钟线，分时/五日降级为日K
  if (secid.startsWith('hk') && (period === 'trend' || period === 'trend5')) {
    fetchTencentKline(info, 101, period, 60, hasCache);
  } else if (period === 'trend') {
    fetchTencentTrend(info, 1, hasCache);
  } else if (period === 'trend5') {
    fetchTencentTrend(info, 5, hasCache);
  } else {
    const kltMap = { day: 101, week: 102, month: 103 };
    const klt = kltMap[period] || 101;
    fetchTencentKline(info, klt, period, 60, hasCache);
  }
}

function renderIndexStatic(info) {
  const data = indexDataCache[info.code];
  const body = document.getElementById('indexDetailBody');
  if (!data) { body.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);">暂无数据</div>'; return; }

  const chg = data.chg || 0;
  const cls = Math.abs(chg) < 0.005 ? 'flat' : (chg >= 0 ? 'up' : 'down');
  const sign = chg > 0 ? '+' : (chg < 0 ? '-' : '');
  const pointChg = data.price - data.prev;
  const pointChgSign = pointChg > 0 ? '+' : (pointChg < 0 ? '-' : '');
  var code = info.code;
  var secid = info.secid || '';
  var isUs = !secid || secid.startsWith('us');
  var chartMsg = isUs ? '该指数暂不支持K线图' : '图表数据加载失败，请检查网络后重试';
  var retryBtn = isUs ? '' : '<button class="action-btn btn-primary" style="font-size:12px;padding:6px 16px;" onclick="retryIndexChart(\'' + code + '\')">重新加载</button>';

  body.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">'
    + '<div style="flex:1;min-width:70px;"><div class="t-10">最新价</div><div style="font-size:18px;font-weight:700;color:' + (cls==='up'?'var(--color-up)':cls==='down'?'var(--color-down)':'var(--text-primary)') + '">' + data.price.toFixed(2) + '</div></div>'
    + '<div style="flex:1;min-width:70px;"><div class="t-10">涨跌幅</div><div style="font-size:14px;font-weight:600;color:' + (cls==='up'?'var(--color-up)':cls==='down'?'var(--color-down)':'var(--text-muted)') + '">' + sign + Math.abs(chg).toFixed(2) + '%</div></div>'
    + '<div style="flex:1;min-width:70px;"><div class="t-10">涨跌额</div><div style="font-size:14px;font-weight:600;color:' + (cls==='up'?'var(--color-up)':cls==='down'?'var(--color-down)':'var(--text-muted)') + '">' + pointChgSign + Math.abs(pointChg).toFixed(2) + '</div></div>'
    + '</div>'
    + '<div style="text-align:center;padding:30px 0;">'
    + '<div style="color:var(--text-muted);font-size:12px;margin-bottom:10px;">' + chartMsg + '</div>'
    + retryBtn
    + '</div>';
}

function retryIndexChart(code) {
  var info = allIndices.find(function(i) { return i.code === code; });
  if (info) fetchIndexData(info, _indexDetailPeriod || 'day');
}

function fetchTencentTrend(info, ndays, hasCache) {
  var tcode = info.tencent;
  var period = ndays === 1 ? 'trend' : 'trend5';
  var mktype = period === 'trend' ? 'm1' : 'm5';
  var url = 'https://ifzq.gtimg.cn/appstock/app/kline/mkline?param=' + tcode + ',' + mktype + ',,240';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.data && res.data[tcode] && res.data[tcode][mktype]) {
        var bars = res.data[tcode][mktype];
        // 数据格式: [time, open, close, high, low, volume, {}, pct]
        var rawData = bars.map(function(b) { var t = b[0]; var ft = t.slice(0,4)+'-'+t.slice(4,6)+'-'+t.slice(6,8)+' '+t.slice(8,10)+':'+t.slice(10,12); return ft + ',' + b[2] + ',' + b[1]; });
        rawData = rawData.filter(function(s) { return parseFloat(s.split(',')[1]) > 0; });
        // 按日分组（在截断前保存最旧那天的收盘价 = 首日前收盘）
        var dayMap = {}, dayList = [];
        rawData.forEach(function(s) {
          var d = s.slice(0, 10);
          if (!dayMap[d]) { dayMap[d] = []; dayList.push(d); }
          dayMap[d].push(s);
        });
        var trend5Base = 0;
        // 分时图只取当天数据
        if (ndays === 1) {
          var today = new Date();
          var todayDate = formatDate(today);
          if (dayMap[todayDate]) {
            rawData = dayMap[todayDate];
          }
          // 如果今天无数据（非交易日/未开盘），保留最新一天的数据
        }
        // 限制最多5个交易日（当天未收盘时数据点不足会跨到第6天）
        if (dayList.length > 5) {
          var oldestBars = dayMap[dayList[0]];
          trend5Base = parseFloat(oldestBars[oldestBars.length - 1].split(',')[1]) || 0;
          var keep = dayList.slice(dayList.length - 5);
          rawData = [];
          keep.forEach(function(d) { rawData = rawData.concat(dayMap[d]); });
        } else if (bars.length > 0) {
          trend5Base = parseFloat(bars[0][1]) || 0;
        }
        if (rawData.length > 0) {
          var preClose = parseFloat((res.data[tcode].prec || '0')) || 0;
          setIndexChartCache(info.code, period, { rawData: rawData, preClose: preClose, trend5Base: trend5Base });
          renderIndexChart(info, rawData, period, preClose, trend5Base);
        } else if (!hasCache) {
          renderIndexStatic(info);
        }
      } else {
        if (!hasCache) renderIndexStatic(info);
      }
    })
    .catch(function() { if (!hasCache) renderIndexStatic(info); });
}

function fetchTencentKline(info, klt, period, limit, hasCache) {
  var tcode = info.tencent;
  var ktypeMap = { 101: 'day', 102: 'week', 103: 'month' };
  var ktype = ktypeMap[klt] || 'day';
  var url = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + tcode + ',' + ktype + ',,,' + limit + ',qfq';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.data && res.data[tcode] && res.data[tcode][ktype]) {
        var bars = res.data[tcode][ktype];
        // Tencent K-line format: [date, open, close, high, low, volume]
        // 转为CSV字符串格式 date,open,close,high,low,volume
        var rawData = bars.map(function(b) { return b[0] + ',' + b[1] + ',' + b[2] + ',' + b[3] + ',' + b[4] + ',' + b[5]; });
        if (rawData.length > 0) {
          var preClose = parseFloat((res.data[tcode].prec || '0')) || 0;
          setIndexChartCache(info.code, period, { rawData: rawData, preClose: preClose });
          renderIndexChart(info, rawData, period, preClose);
        } else if (!hasCache) {
          renderIndexStatic(info);
        }
      } else {
        if (!hasCache) renderIndexStatic(info);
      }
    })
    .catch(function() { if (!hasCache) renderIndexStatic(info); });
}

function renderIndexChart(info, rawData, period, apiPreClose, trend5Base) {
  if (period !== _indexDetailPeriod) return; // 丢弃过期响应，防止快速切换时图表错乱
  const data = indexDataCache[info.code];
  const chg = data ? (data.chg || 0) : 0;
  const cls = Math.abs(chg) < 0.005 ? 'flat' : (chg >= 0 ? 'up' : 'down');
  const sign = chg > 0 ? '+' : (chg < 0 ? '-' : '');
  const pointChg = data ? (data.price - data.prev) : 0;
  const pointChgSign = pointChg > 0 ? '+' : (pointChg < 0 ? '-' : '');
  
  // 解析图表数据（根据字段数自动判断格式：≤4字段=分时，≥5字段=K线）
  let chartPoints, isTrend;
  const klineFmt = rawData.length > 0 && rawData[0].split(',').length >= 5;
  if (!klineFmt && (period === 'trend' || period === 'trend5')) {
    isTrend = true;
    chartPoints = rawData.map(s => {
      const parts = s.split(',');
      return { time: parts[0], price: parseFloat(parts[1]) || 0, open: parts.length > 2 ? (parseFloat(parts[2]) || 0) : 0 };
    }).filter(p => p.price > 0);
  } else {
    isTrend = false;
    chartPoints = rawData.map(s => {
      const parts = s.split(',');
      return { time: parts[0], open: parseFloat(parts[1]), close: parseFloat(parts[2]), high: parseFloat(parts[3]), low: parseFloat(parts[4]), vol: parseFloat(parts[5]) || 0 };
    }).filter(p => p.close > 0);
  }
  
  // 五日图限制最多5个交易日（K线数据不截断）
  if (isTrend && period === 'trend5' && chartPoints.length > 0) {
    var dayMap = {}, dayList = [];
    chartPoints.forEach(function(p) {
      var d = p.time.slice(0, 10);
      if (!dayMap[d]) { dayMap[d] = []; dayList.push(d); }
      dayMap[d].push(p);
    });
    if (dayList.length > 5) {
      var keep = dayList.slice(dayList.length - 5);
      chartPoints = [];
      keep.forEach(function(d) { chartPoints = chartPoints.concat(dayMap[d]); });
    }
  }

  if (!chartPoints.length) { renderIndexStatic(info); return; }

  // 优先使用腾讯实时行情（刷新快、数据准），图表数据作为兜底
  const lastPoint = chartPoints[chartPoints.length-1];
  const lastVal = (data && data.price > 0) ? data.price : (isTrend ? lastPoint.price : lastPoint.close);

  let todayOpen, todayHigh, todayLow, todayVol;
  if (isTrend) {
    const prices = chartPoints.map(p => p.price);
    todayOpen = (data && data.open > 0) ? data.open : chartPoints[0].price;
    todayHigh = (data && data.high > 0) ? data.high : Math.max(...prices);
    todayLow = (data && data.low > 0) ? data.low : Math.min(...prices);
    todayVol = 0;
  } else {
    todayOpen = (data && data.open > 0) ? data.open : lastPoint.open;
    todayHigh = (data && data.high > 0) ? data.high : lastPoint.high;
    todayLow = (data && data.low > 0) ? data.low : lastPoint.low;
    todayVol = chartPoints.reduce((s, p) => s + p.vol, 0);
  }

  // 优先使用腾讯行情缓存的昨收价，API返回的preClose作为兜底
  const prevClose = (data && data.prev > 0) ? data.prev : ((apiPreClose > 0 ? apiPreClose : 0) || 0);
  // 五日图基准：使用截断前保存的最旧日收盘价，兜底用首日第一根K线开盘价
  var trend5Ref = prevClose;
  if (period === 'trend5') {
    if (trend5Base > 0) {
      trend5Ref = trend5Base;
    } else if (chartPoints.length > 0 && chartPoints[0].open > 0) {
      trend5Ref = chartPoints[0].open;
    } else if (apiPreClose > 0) {
      trend5Ref = apiPreClose;
    }
  }
  const amplitude = prevClose > 0 ? ((todayHigh - todayLow) / prevClose * 100).toFixed(2) : '0.00';
  
  // 周期按钮文字
  const periodNames = PERIOD_NAMES;
  
  // 构建界面
  const priceColor = cls === 'up' ? 'var(--color-up)' : (cls === 'down' ? 'var(--color-down)' : 'var(--text-primary)');
  const chgColor = cls === 'up' ? 'var(--color-up)' : (cls === 'down' ? 'var(--color-down)' : 'var(--text-muted)');
  
  const body = document.getElementById('indexDetailBody');
  const hasChart = !!document.getElementById('indexChartSection')?.querySelector('canvas');
  
  if (!hasChart) {
    // 首次渲染：构建完整界面
    body.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 6px;margin-bottom:8px;">
      <div><div class="t-9">最新</div><div style="font-size:16px;font-weight:700;color:${priceColor}">${lastVal.toFixed(2)}</div></div>
      <div><div class="t-9">涨跌幅</div><div style="font-size:13px;font-weight:600;color:${chgColor}">${sign}${Math.abs(chg).toFixed(2)}%</div></div>
      <div><div class="t-9">涨跌额</div><div style="font-size:13px;font-weight:600;color:${chgColor}">${pointChgSign}${Math.abs(pointChg).toFixed(2)}</div></div>
      <div><div class="t-9">今开</div><div style="font-size:12px;font-weight:500;color:var(--text-primary);">${todayOpen.toFixed(2)}</div></div>
      <div><div class="t-9">昨收</div><div style="font-size:12px;font-weight:500;color:var(--text-primary);">${prevClose.toFixed(2)}</div></div>
      <div><div class="t-9">振幅</div><div style="font-size:12px;font-weight:500;color:var(--text-primary);">${amplitude}%</div></div>
      <div><div class="t-9">最高</div><div style="font-size:12px;font-weight:500;color:var(--color-up);">${todayHigh.toFixed(2)}</div></div>
      <div><div class="t-9">最低</div><div style="font-size:12px;font-weight:500;color:var(--color-down);">${todayLow.toFixed(2)}</div></div>
      <div><div class="t-9">${isTrend?'成交额':'成交量'}</div><div style="font-size:12px;font-weight:500;color:var(--text-primary);">${todayVol > 100000000 ? (todayVol/100000000).toFixed(2)+'亿' : todayVol > 10000 ? (todayVol/10000).toFixed(2)+'万' : todayVol.toFixed(0)}</div></div>
    </div>
    <div id="indexDetailTabs" style="display:flex;gap:4px;margin-bottom:4px;overflow-x:auto;"></div>
    <div id="indexChartSection">
      <div id="indexChartInfo" style="font-size:12px;background:var(--bg-surface-3);border:1px solid var(--border-default);border-radius:8px;min-height:34px;box-sizing:border-box;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;gap:0;font-variant-numeric:tabular-nums;">
        <div style="min-width:155px;max-width:155px;text-align:left;white-space:nowrap;">
          <div id="icDate" style="font-weight:600;font-size:12px;"></div>
        </div>
        <div style="min-width:80px;max-width:80px;text-align:left;white-space:nowrap;">
          <div id="icPct" style="font-weight:600;font-size:12px;"></div>
        </div>
        <div style="min-width:80px;max-width:80px;text-align:left;white-space:nowrap;">
          <div id="icClose" style="font-weight:600;font-size:12px;"></div>
        </div>
        <div style="min-width:80px;max-width:80px;text-align:left;white-space:nowrap;">
          <div id="icOpen" style="font-weight:600;font-size:12px;"></div>
        </div>
      </div>
      <div style="position:relative;height:215px;border-radius:10px;background:var(--bg-surface-2);overflow:hidden;">
        <canvas id="indexDetailCanvas" style="width:100%;height:100%;"></canvas>
      
        <div id="hkChartOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:2;pointer-events:none;"><span style="color:var(--text-secondary);font-size:13px;font-weight:500;background:var(--bg-surface-2);padding:6px 16px;border-radius:6px;">分时/五日暂不支持港股</span></div>
      </div>
    </div>`;
  } else {
    // 切换周期：更新 tabs 激活状态
    document.querySelectorAll('#indexDetailTabs .chart-tab').forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`#indexDetailTabs .chart-tab[onclick*="'${period}'"]`);
    if (activeTab) activeTab.classList.add('active');
  }
  
  // 渲染周期切换按钮（首次时）
  const canvas = document.getElementById('indexDetailCanvas');
  if (!hasChart) {
  const tabsHtml = _indexTabOrder.map(p =>
    `<button class="chart-tab ${p===period?'active':''}" onclick="switchIndexPeriod('${p}')">${periodNames[p]}</button>`
  ).join('') + '<button class="chart-tab gear-tab" onclick="toggleTabSettings(event)" title="自定义排序">⚙</button>';
  document.getElementById('indexDetailTabs').innerHTML = tabsHtml;
  }
  
  // 画图
  setTimeout(() => {
    if (!canvas || !canvas.parentElement) return;
    drawIndexChart(canvas, chartPoints, isTrend, cls !== 'down' ? '#ef4444' : '#22c55e', period === 'trend5' ? trend5Ref : prevClose, period);
	    // 港股分时/五日：模糊日K + 覆盖层提示
	    const hkOverlay = document.getElementById('hkChartOverlay');
	    if (!isTrend && (period === 'trend' || period === 'trend5')) {
	      canvas.style.filter = 'blur(3px)';
	      if (hkOverlay) hkOverlay.style.display = 'flex';
	    } else {
	      canvas.style.filter = '';
	      if (hkOverlay) hkOverlay.style.display = 'none';
	    }
  }, 80);
  
  // 如果昨收数据暂时不可用（缓存未就绪），1秒后重试一次
  if (prevClose <= 0 && info && !data) {
    setTimeout(() => {
      const retryData = indexDataCache[info.code];
      if (retryData && retryData.prev > 0) {
        const retryCanvas = document.getElementById('indexDetailCanvas');
        if (retryCanvas && retryCanvas._chartImage) {
          drawIndexChart(retryCanvas, chartPoints, isTrend, cls !== 'down' ? '#ef4444' : '#22c55e', retryData.prev, period);
        }
      }
    }, 1000);
  }
  
  // 深色模式适配（通过 CSS 变量自动处理）
  if (document.body.classList.contains('dark') && canvas) {
    canvas.parentElement.style.background = 'var(--bg-surface)';
  }
}

function switchIndexPeriod(period) {
  if (!_indexDetailCode) return;
  _indexDetailPeriod = period;
  const info = allIndices.find(i => i.code === _indexDetailCode);
  if (!info) return;
  // 更新 tab 激活状态
  document.querySelectorAll('#indexDetailTabs .chart-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`#indexDetailTabs .chart-tab[onclick*="'${period}'"]`);
  if (activeTab) activeTab.classList.add('active');
  // 旧图变淡，提示正在加载新数据
  const canvas = document.getElementById('indexDetailCanvas');
  if (canvas) canvas.style.opacity = '0.3';
  fetchIndexData(info, period);
}

// Tabs排序控制
function toggleTabSettings(e) {
  e.stopPropagation();
  document.getElementById('tabSettings').style.display = 'block';
  document.getElementById('tabSettings-overlay').style.display = 'block';
  renderTabOrderList();
}
function renderTabOrderList() {
  const list = document.getElementById('tsList');
  if (!list) return;
  list.innerHTML = _indexTabOrder.map((id, i) =>
    `<div class="ts-row" data-idx="${i}" onselectstart="return false" oncontextmenu="return false">
      <span class="ts-drag">☰</span>
      <span class="ts-label">${PERIOD_NAMES[id]||id}</span>
    </div>`
  ).join('');
  _initDragSort(list, '.ts-row', 'idx', (src, tgt) => {
    const [moved] = _indexTabOrder.splice(src, 1);

}
function applyTabOrder() {
  closeTabSettings();
  // 如果详情已打开，重新渲染tabs
  const container = document.getElementById('indexDetailTabs');
  if (container && _indexDetailCode) {
    const period = _indexDetailPeriod || 'trend';
    const periodNames = PERIOD_NAMES;

      `<button class="chart-tab ${p===period?'active':''}" onclick="switchIndexPeriod('${p}')">${periodNames[p]}</button>`
    ).join('') + '<button class="chart-tab gear-tab" onclick="toggleTabSettings(event)" title="自定义排序">⚙</button>';
  }
}
function closeTabSettings() {
  document.getElementById('tabSettings').style.display = 'none';
  document.getElementById('tabSettings-overlay').style.display = 'none';
}

// A股交易时段: 9:30-11:30 (120min) + 13:00-15:00 (120min) = 240min
const TOTAL_SESSION_MIN = 240;
function _sessionMinute(timeStr) {
  var p = timeStr.slice(-5).split(':');
  var h = parseInt(p[0]), m = parseInt(p[1]);
  var absMin = h * 60 + m;
  if (absMin >= 13 * 60) return absMin - (9 * 60 + 30) - 90;
  return absMin - (9 * 60 + 30);
}

function drawIndexChart(canvas, points, isTrend, color, preClose, period) {
  try {
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = Math.round(rect.width) || 340;
  const h = 210;
  const dpr = window.devicePixelRatio || 1;
  const isDark = document.body.classList.contains('dark');
  // 每次重置canvas context避免scale叠加（移动端切换周期后图表不渲染的问题）
  canvas.style.opacity = '1';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  if (points.length < 2) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('数据不足', w/2, h/2);
    return;
  }
  
  const pad = { top: 20, bottom: 38, left: 15, right: 15 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  
  // 计算价格范围
  let minY, maxY;
  if (isTrend) {
    const prices = points.map(p => p.price);
    if (period === 'trend') {
      // 分时图：以昨收为基准居中
      if (preClose > 0) {
        var maxDevT = Math.max(...prices.map(function(p) { return Math.abs(p - preClose); }));
        minY = preClose - maxDevT;
        maxY = preClose + maxDevT;
      } else {
        minY = Math.min(...prices);
        maxY = Math.max(...prices);
        var rngT = maxY - minY || 1;
        minY -= rngT * 0.03; maxY += rngT * 0.03;
      }
    } else if (period === 'trend5') {
      // 五日图：以前收盘为基准居中
      var baseVal5 = preClose > 0 ? preClose : (points.length > 0 ? points[0].price : 0);
      if (baseVal5 > 0) {
        var maxDev5 = Math.max(...prices.map(function(p) { return Math.abs(p - baseVal5); }));
        minY = baseVal5 - maxDev5;
        maxY = baseVal5 + maxDev5;
      } else {
        minY = Math.min(...prices);
        maxY = Math.max(...prices);
        var range5 = maxY - minY || 1;
        minY -= range5 * 0.03; maxY += range5 * 0.03;
      }
    } else {
      minY = Math.min(...prices);
      maxY = Math.max(...prices);
    }
  } else {
    const allPrices = points.flatMap(p => [p.high, p.low, p.close, p.open]);
    minY = Math.min(...allPrices);
    maxY = Math.max(...allPrices);
  }

  // 画背景网格
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }
  
  // Y 轴价格刻度标签（左侧，所有图表）
  if (!isTrend || period === 'trend5' || period === 'trend') {
    const yr = maxY - minY;
    var decimals = maxY >= 10000 ? 0 : 2; // A股统一2位小数，超大数值时取整
    ctx.fillStyle = isDark ? '#94a3b8' : '#64748b';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // 三个标签：最高、中间、最低
    var lblVals = [maxY, (maxY + minY) / 2, minY];
    var lblYs = [pad.top, pad.top + ch / 2, pad.top + ch];
    for (var li = 0; li < 3; li++) {
      ctx.fillText(lblVals[li].toFixed(decimals), 2, lblYs[li]);
    }
  }
  
  // 基准线（灰色虚线，分时/五日图均以昨收/前收为基准）
  if (isTrend && (period === 'trend' || period === 'trend5')) {
    const baseVal = preClose > 0 ? preClose : points[0].price;
    if (!baseVal || baseVal <= 0) { /* skip baseline */ } else {
    const py = yPos(baseVal);
    ctx.save();
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = isDark ? 'rgba(148,163,184,0.6)' : 'rgba(100,116,139,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, py);
    ctx.lineTo(w - pad.right, py);
    ctx.stroke();
    ctx.restore();
    // 在右侧标注
    const label = period === 'trend' ? '昨收' : '前收';
    ctx.fillStyle = isDark ? 'rgba(148,163,184,0.5)' : 'rgba(100,116,139,0.45)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, w - pad.right - 4, py);
    }
  }
  
  function yPos(val) { return pad.top + ch * (1 - (val - minY) / (maxY - minY)); }
  function xPos(idx) { return pad.left + cw * idx / (points.length - 1); }
  
  // ── 分时图按真实交易时间定位（非均分） ──
  function xPosForTrend(timeStr) {
    var sm = Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(timeStr)));
    return pad.left + cw * sm / TOTAL_SESSION_MIN;
  }
  
  if (isTrend) {
    // 五日图：按交易日分组，日间断开不连线
    if (period === 'trend5') {
      var tdDays = [], tdGroups = [];
      points.forEach(function(p) {
        var d = p.time.slice(0, 10);
        if (tdGroups.length === 0 || tdDays[tdDays.length-1] !== d) { tdDays.push(d); tdGroups.push([]); }
        tdGroups[tdGroups.length-1].push(p);
      });
      // 限制最多5个交易日（当天未收盘时不足240根，1200数据点会跨到第6天）
      if (tdDays.length > 5) { tdDays = tdDays.slice(tdDays.length-5); tdGroups = tdGroups.slice(tdGroups.length-5); }
      var tdLen = tdDays.length;
      // 每天的前日收盘：首日用API昨收，后续用前一日最后一笔价格
      var tdPrevCloses = [];
      for (var tdi = 0; tdi < tdGroups.length; tdi++) {
        if (tdi === 0) {
          tdPrevCloses.push(preClose > 0 ? preClose : tdGroups[0][0].price);
        } else {
          var prevGroup = tdGroups[tdi - 1];
          tdPrevCloses.push(prevGroup[prevGroup.length - 1].price);
        }
      }
      for (var di = 0; di < tdGroups.length; di++) {
        var dps = tdGroups[di];
        if (dps.length < 2) continue;
        // 根据该日涨跌确定颜色（基于该日前日收盘）
        var dayLast = dps[dps.length - 1].price;
        var dayPrev = tdPrevCloses[di] > 0 ? tdPrevCloses[di] : dayLast;
        var dayColor = dayLast >= dayPrev ? '#ef4444' : '#22c55e';
        ctx.beginPath();
        ctx.strokeStyle = dayColor;
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        dps.forEach(function(p, i) {
          var x = pad.left + cw * (di / tdLen + Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(p.time))) / TOTAL_SESSION_MIN / tdLen);
          var y = yPos(p.price);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        var gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
        gradient.addColorStop(0, dayColor + '30');
        gradient.addColorStop(1, dayColor + '05');
        var lx1 = pad.left + cw * (di / tdLen + Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(dps[dps.length-1].time))) / TOTAL_SESSION_MIN / tdLen);
        ctx.lineTo(lx1, pad.top + ch);
        var fx1 = pad.left + cw * (di / tdLen + Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(dps[0].time))) / TOTAL_SESSION_MIN / tdLen);
        ctx.lineTo(fx1, pad.top + ch);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();
      }
    } else {
    // 单日分时线
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    points.forEach((p, i) => {
      const x = xPosForTrend(p.time);
      const y = yPos(p.price);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 填充渐变
    const lastX = xPosForTrend(points[points.length - 1].time);
    const lastY = yPos(points[points.length - 1].price);
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    gradient.addColorStop(0, color + '30');
    gradient.addColorStop(1, color + '05');
    ctx.lineTo(lastX, pad.top + ch);
    const firstX = xPosForTrend(points[0].time);
    ctx.lineTo(firstX, pad.top + ch);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    }

  } else {
    // 蜡烛图
    const candleW = Math.max(3, cw / points.length * 0.5);
    const halfW = candleW / 2;
    const wickW = 1;
    
    // 画成交量柱（底部）
    const volMax = Math.max(...points.map(p => p.vol));
    if (volMax > 0) {
      points.forEach((p, i) => {
        const x = xPos(i);
        const barW = Math.max(1, cw / points.length * 0.6);
        const isUp = p.close >= p.open;
        const barColor = isUp ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)';
        const volH = (p.vol / volMax) * ch * 0.15;
        ctx.fillStyle = barColor;
        ctx.fillRect(x - barW/2, pad.top + ch - volH, barW, volH);
      });
    }
    
    // 画蜡烛
    points.forEach((p, i) => {
      const isUp = p.close >= p.open;
      const candleColor = isUp ? '#ef4444' : '#22c55e';

      const priceLow = Math.min(p.open, p.close);
      const priceHigh = Math.max(p.open, p.close);
      const yLow = yPos(priceLow);
      const yHigh = yPos(priceHigh);
      const bodyH = Math.max(1, yLow - yHigh);

      // 实体位置
      const rw = Math.max(2, Math.round(candleW));
      const rx = Math.round(xPos(i) - rw / 2);
      const cx = rx + rw / 2;

      // 影线（以实体中心为基准）
      ctx.strokeStyle = candleColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, Math.round(yPos(p.high)));
      ctx.lineTo(cx, Math.round(yPos(p.low)));
      ctx.stroke();

      // 实体
      ctx.fillStyle = isUp ? '#ef4444' : '#22c55e';
      ctx.fillRect(rx, Math.round(yHigh), rw, Math.round(bodyH));
    });
  }
  
  // 标记最新价
  const last = points[points.length - 1];
  const lastPrice = isTrend ? last.price : last.close;
  var lx;
  if (isTrend && period === 'trend') {
    lx = xPosForTrend(last.time);
  } else if (isTrend && period === 'trend5') {
    var t5d = tdDays.length - 1;
    lx = pad.left + cw * (t5d / tdDays.length + (Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(last.time))) / TOTAL_SESSION_MIN) / tdDays.length);
  } else {
    lx = xPos(points.length - 1);
  }
  const ly = yPos(lastPrice);
  
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(lx, ly, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // 底部 X 轴标注
  ctx.fillStyle = isDark ? '#94a3b8' : '#64748b';
  ctx.font = 'bold 10px sans-serif';
  ctx.textBaseline = 'bottom';

  function formatDateLabel(t) {
    if (period === 'trend') {
      return t.slice(11, 16);
    } else if (period === 'trend5') {
      var parts = t.slice(0, 10).split('-');
      return parts[1] + '/' + parts[2];
    } else {
      var d = t.slice(0, 10);
      return d.slice(2);
    }
  }

  var labelItems = [];
  if (period === 'trend') {
    // 分时图：标签按固定交易时间节点定位（09:30 / 11:30|13:00 / 15:00）
    labelItems.push({ x: pad.left, label: '09:30', align: 'left' });
    labelItems.push({ x: pad.left + cw * 120 / TOTAL_SESSION_MIN, label: '11:30|13:00', align: 'center' });
    labelItems.push({ x: pad.left + cw, label: '15:00', align: 'right' });
  } else if (period === 'trend5') {
    if (isTrend && tdDays.length > 0) {
      for (var di = 0; di < tdDays.length; di++) {
        var labelX = pad.left + cw * (di + 0.5) / tdDays.length;
        labelItems.push({ x: labelX, label: formatDateLabel(tdDays[di] + ' 00:00'), align: 'center' });
      }
    } else {
      labelItems.push({ x: xPos(0), label: formatDateLabel(points[0].time), align: 'left' });
      labelItems.push({ x: xPos(Math.floor(points.length / 2)), label: formatDateLabel(points[Math.floor(points.length / 2)].time), align: 'center' });
      labelItems.push({ x: xPos(points.length - 1), label: formatDateLabel(points[points.length - 1].time), align: 'right' });
    }
  } else {
    labelItems.push({ x: xPos(0), label: formatDateLabel(points[0].time), align: 'left' });
    labelItems.push({ x: xPos(Math.floor(points.length / 2)), label: formatDateLabel(points[Math.floor(points.length / 2)].time), align: 'center' });
    labelItems.push({ x: xPos(points.length - 1), label: formatDateLabel(points[points.length - 1].time), align: 'right' });
  }
  labelItems.forEach(function(it) {
    ctx.textAlign = it.align;
    ctx.fillText(it.label, it.x, pad.top + ch + 18);
  });
  
  // 底部横线（时间轴）
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top + ch + 2);
  ctx.lineTo(pad.left + cw, pad.top + ch + 2);
  ctx.stroke();
  
  // ── 保存图表状态（用于十字定位轴） ──
  canvas._indexChartState = { points, isTrend, period, pad, cw, ch, minY, maxY, color, w, h, isDark: document.body.classList.contains('dark'), preClose, tdDays: period === 'trend5' ? tdDays : null, tdPrevCloses: period === 'trend5' ? tdPrevCloses : null };
  try{ canvas._chartImage = ctx.getImageData(0,0,canvas.width,canvas.height); }catch(e){}
  setupIndexCrosshair(canvas);
  
  // 初始化信息条（显示最后一个点的数据）
  const lastP = points[points.length - 1];
  const lastV = isTrend ? lastP.price : lastP.close;
  const dEl = document.getElementById('icDate');
  const cEl = document.getElementById('icClose');
  const pEl = document.getElementById('icPct');
  const oEl = document.getElementById('icOpen');

  if (dEl) {
    if (isTrend) {
      // 分时：涨幅基于昨收；五日：基于最后一天的前日收盘
      var prevPrice;
      if (period === 'trend') {
        prevPrice = preClose > 0 ? preClose : lastV;
      } else if (period === 'trend5' && tdPrevCloses && tdPrevCloses.length) {
        prevPrice = tdPrevCloses[tdPrevCloses.length - 1];
      } else {
        prevPrice = points.length >= 2 ? points[points.length - 2].price : lastV;
      }
      const pct = calcPct(lastV, prevPrice);
      var timeLabel = period === 'trend' ? lastP.time.slice(11, 16) : lastP.time;
      $ic(dEl, `时间 ${timeLabel}`);
      $ic(cEl, lastV.toFixed(2), color);
      $ic(oEl, '', '');
      if (oEl && oEl.parentElement) oEl.parentElement.style.display = 'none';
      $ic(pEl, pct.txt || '涨幅 --', pct.clr || 'var(--text-muted)');
    } else {
      if (oEl && oEl.parentElement) oEl.parentElement.style.display = '';
      // K线涨幅基于前一根收盘价
      const prevClose = points.length >= 2 ? points[points.length - 2].close : lastP.close;
      const pct = calcPct(lastP.close, prevClose);
      const isUp = lastP.close >= lastP.open;
      const kColor = isUp ? '#ef4444' : '#22c55e';
      $ic(dEl, `时间 ${lastP.time}`);
      $ic(cEl, `收 ${lastP.close.toFixed(2)}`, kColor);
      $ic(oEl, `开 ${lastP.open.toFixed(2)}`, kColor);
      $ic(pEl, pct.txt || '涨幅 --', pct.clr || 'var(--text-muted)');
    }
  }
} catch(e){ console.warn('drawIndexChart error:',e); }
}

// ── 指数图表十字定位轴 ──
function setupIndexCrosshair(canvas) {
  if (!canvas) return;
  canvas.removeEventListener('mousemove', _onIndexCrossMove);
  canvas.removeEventListener('mouseleave', _onIndexCrossLeave);
  canvas.removeEventListener('touchstart', _onIndexCrossTouchStart);
  canvas.removeEventListener('touchmove', _onIndexCrossTouchMove);
  canvas.removeEventListener('touchend', _onIndexCrossTouchEnd);
  canvas.addEventListener('mousemove', _onIndexCrossMove);
  canvas.addEventListener('mouseleave', _onIndexCrossLeave);
  canvas.addEventListener('touchstart', _onIndexCrossTouchStart, { passive: false });
  canvas.addEventListener('touchmove', _onIndexCrossTouchMove, { passive: false });
  canvas.addEventListener('touchend', _onIndexCrossTouchEnd, { passive: false });
}

function _onIndexCrossMove(e) {
  const canvas = e.currentTarget;
  const st = canvas._indexChartState;
  if (!st || !canvas._chartImage) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  _drawIndexCrosshair(canvas, mx, my, st);
}

function _onIndexCrossTouchStart(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  canvas._touchActive = true;
  _updateIndexCrossFromTouch(canvas, e.touches[0]);
}
function _onIndexCrossTouchMove(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  if (!canvas._touchActive) return;
  _updateIndexCrossFromTouch(canvas, e.touches[0]);
}
function _onIndexCrossTouchEnd(e) {
  const canvas = e.currentTarget;
  canvas._touchActive = false;
  setTimeout(() => {
    if (!canvas._touchActive && canvas._chartImage) {
      const ctx = canvas.getContext('2d');
      ctx.putImageData(canvas._chartImage, 0, 0);
      _clearICInfo();
    }
  }, 1500);
}
function _updateIndexCrossFromTouch(canvas, touch) {
  const rect = canvas.getBoundingClientRect();
  const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
  _drawIndexCrosshair(canvas, mx, my, canvas._indexChartState);
}
function _onIndexCrossLeave(e) {
  const canvas = e.currentTarget;
  if (!canvas._chartImage) return;
  const ctx = canvas.getContext('2d');
  ctx.putImageData(canvas._chartImage, 0, 0);
  _clearICInfo();
}

function _drawIndexCrosshair(canvas, mx, my, st) {
  const { points, isTrend, period, pad, cw, ch, minY, maxY, color, w, h, isDark } = st;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  
  // 恢复原图
  if (canvas._chartImage) ctx.putImageData(canvas._chartImage, 0, 0);
  
  const sx = (mx / dpr - pad.left) / cw; // 相对位置 0~1
  let idx, px, p;
  
  if (isTrend && period === 'trend') {
    // 分时图：按交易时间定位，找离鼠标最近的数据点
    var targetMin = Math.max(0, Math.min(TOTAL_SESSION_MIN,sx * TOTAL_SESSION_MIN));
    idx = 0;
    var bestDist = Infinity;
    for (var i = 0; i < points.length; i++) {
      var pm = _sessionMinute(points[i].time);
      var d = Math.abs(pm - targetMin);
      if (d < bestDist) { bestDist = d; idx = i; }
    }
    p = points[idx];
    px = pad.left + cw * (Math.max(0, Math.min(TOTAL_SESSION_MIN,_sessionMinute(p.time))) / TOTAL_SESSION_MIN);
  } else if (isTrend && period === 'trend5' && st.tdDays && st.tdDays.length) {
    // 五日图：先定位到哪一天，再按那天的交易时间找最近点
    var t5d = st.tdDays;
    var dayIdx = Math.min(t5d.length - 1, Math.floor(sx * t5d.length));
    var dayStart = dayIdx / t5d.length;
    var dayWidth = 1 / t5d.length;
    var withinDay = Math.max(0, Math.min(1, (sx - dayStart) / dayWidth));
    var targetMin5 = Math.max(0, Math.min(TOTAL_SESSION_MIN, withinDay * TOTAL_SESSION_MIN));
    idx = 0;
    var bestDist5 = Infinity;
    for (var i2 = 0; i2 < points.length; i2++) {
      if (points[i2].time.slice(0, 10) !== t5d[dayIdx]) continue;
      var pm5 = _sessionMinute(points[i2].time);
      var d5 = Math.abs(pm5 - targetMin5);
      if (d5 < bestDist5) { bestDist5 = d5; idx = i2; }
    }
    p = points[idx];
    var realDi = t5d.indexOf(p.time.slice(0, 10));
    px = pad.left + cw * (realDi / t5d.length + (Math.max(0, Math.min(TOTAL_SESSION_MIN, _sessionMinute(p.time))) / TOTAL_SESSION_MIN) / t5d.length);
  } else {
    idx = Math.round(sx * (points.length - 1));
    idx = Math.max(0, Math.min(points.length - 1, idx));
    p = points[idx];
    px = pad.left + cw * idx / (points.length - 1);
  }
  
  const price = isTrend ? p.price : p.close;
  const py = pad.top + ch * (1 - (price - minY) / (maxY - minY));
  
  // 十字线（数据坐标映射到 CSS 像素）
  const cssPx = px;
  const cssPy = py;
  
  ctx.save();
  // 竖线
  ctx.strokeStyle = isDark ? 'rgba(148,163,184,0.6)' : 'rgba(71,85,105,0.5)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(cssPx, pad.top); ctx.lineTo(cssPx, pad.top + ch); ctx.stroke();
  // 横线
  ctx.beginPath(); ctx.moveTo(pad.left, cssPy); ctx.lineTo(pad.left + cw, cssPy); ctx.stroke();
  ctx.setLineDash([]);
  
  // 圆点（与基金走势图十字轴点同一配色，无描边）
  ctx.fillStyle = isDark ? '#f1f5f9' : '#0f172a';
  ctx.beginPath(); ctx.arc(cssPx, cssPy, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  
  // 更新固定信息条
  const dEl = document.getElementById('icDate');
  const cEl = document.getElementById('icClose');
  const pEl = document.getElementById('icPct');
  const oEl = document.getElementById('icOpen');

  if (dEl) {
    if (isTrend) {
      var tLabel = period === 'trend' ? p.time.slice(11, 16) : p.time;
      $ic(dEl, `时间 ${tLabel}`);
      // 分时：开=当日首点价；五日：开=该日首点价
      var trOpen;
      if (period === 'trend') {
        trOpen = points[0].price;
      } else {
        var pDate = p.time.slice(0, 10);
        var firstOfDay = points.find(function(pt) { return pt.time.slice(0, 10) === pDate; });
        trOpen = firstOfDay ? firstOfDay.price : p.price;
      }
      var trIsUp = p.price >= trOpen;
      $ic(cEl, '收 ' + p.price.toFixed(2), trIsUp ? 'var(--color-up)' : 'var(--color-down)');
      $ic(oEl, '开 ' + trOpen.toFixed(2), trIsUp ? 'var(--color-up)' : 'var(--color-down)');
      if (oEl && oEl.parentElement) oEl.parentElement.style.display = '';
      // 分时：涨幅基于昨收；五日：基于该日前日收盘
      var prevPrice;
      if (period === 'trend') {
        prevPrice = st.preClose > 0 ? st.preClose : p.price;
      } else if (period === 'trend5' && st.tdPrevCloses && st.tdDays) {
        var pDay = p.time.slice(0, 10);
        var pDayIdx = st.tdDays.indexOf(pDay);
        prevPrice = (pDayIdx >= 0 && pDayIdx < st.tdPrevCloses.length) ? st.tdPrevCloses[pDayIdx] : p.price;
      } else {
        prevPrice = idx > 0 ? points[idx - 1].price : p.price;
      }
      const pct = calcPct(p.price, prevPrice);
      $ic(pEl, pct.txt || '涨幅 --', pct.clr || 'var(--text-muted)');
    } else {
      if (oEl && oEl.parentElement) oEl.parentElement.style.display = '';
      const isUp = p.close >= p.open;
      $ic(dEl, `时间 ${p.time}`);
      $ic(cEl, `收 ${p.close.toFixed(2)}`, isUp ? 'var(--color-up)' : 'var(--color-down)');
      $ic(oEl, `开 ${p.open.toFixed(2)}`, isUp ? 'var(--color-up)' : 'var(--color-down)');
      // K线涨幅基于前一根收盘价
      const prevClose = idx > 0 ? points[idx - 1].close : p.close;
      const pct = calcPct(p.close, prevClose);
      $ic(pEl, pct.txt || '涨幅 --', pct.clr || 'var(--text-muted)');
    }
  }
}

// ============ 核心计算逻辑（官方标准公式）============


function isMarketOpenNow(fund) {
  const fsrq = fund.jzrq || '';
  const vJzrq = fund._valuationJzrq || '';
  // fsrq == vJzrq 为盘中，其他情况为盘后（QDII 和非 QDII 相同逻辑）
  return (fsrq !== '' && vJzrq !== '' && fsrq === vJzrq);
}

function ensureShares(fund) {
  return (fund.shares && fund.shares > 0) ? fund.shares : 0;
}

function calcTodayProfit(fund, isMarketOpen=true) {
  const shares = ensureShares(fund);
  const dwjz = parseFloat(fund.dwjz) || 0;
  const prevDwjz = parseFloat(fund._prevDwjz) || 0;
  const gsz = parseFloat(fund.gsz) || 0;
  if (shares > 0 && prevDwjz > 0) {
    // 当日买入份额不参与当日收益，当日卖出份额仍参与当日涨跌
    const today = new Date().toISOString().slice(0, 10);
    let buyToday = 0, sellToday = 0;
    for (const op of (fund.operations || [])) {
      if (op.date !== today || op.status !== 'confirmed') continue;
      const s = op.confirmShares || 0;
      if (s <= 0) continue;
      if (op.type === 'add') buyToday += s;
      else if (op.type === 'reduce') sellToday += s;
    }
    const shareForProfit = Math.max(0, shares - buyToday + sellToday);
    if (isMarketOpen && gsz > 0 && Math.abs(gsz - prevDwjz) > 0.0001) {
      return r2(shareForProfit * (gsz - prevDwjz));
    }
    return r2(shareForProfit * (dwjz - prevDwjz));
  }
  return 0;
}
function calcDisplayProfit(fund, isMarketOpen=true) {
  const base = (fund.totalProfit !== null && fund.totalProfit !== undefined) ? fund.totalProfit : 0;
  return base + calcTodayProfit(fund, isMarketOpen);
}

function calcDisplayRate(profit, amount) {
  if (profit === null || amount <= 0) return null;
  return profit / amount * 100;
}

function getMarketValue(fund, isMarketOpen) {
  const shares = ensureShares(fund);
  const nav = parseFloat(fund.dwjz) || parseFloat(fund.gsz) || 0;
  if (shares > 0 && nav > 0) {
    const cost = Number(fund.cost) || 0;
    const profit = cost > 0 ? r2((nav - cost) * shares) : 0;
    const marketVal = r2(shares * nav);
    fund.totalProfit = profit;
    fund._origMarketVal = marketVal;
    fund.amount = r2(cost * shares);
    fund._tnCalculated = true;
    return marketVal;
  }
  return fund.amount || 0;
}

function daysBetween(d1,d2){
  if(!d1||!d2)return'--';
  const a=new Date(d1),b=new Date(d2);
  return Math.max(0,Math.floor((b-a)/(86400000)));
}

function renderFunds(){
  if(!Array.isArray(funds)){ funds=[]; saveFunds(true); }
  const container=document.getElementById('fundList');
  const summaryBar=document.getElementById('summaryBar');
  renderGroupTabs();
  const displayFunds = getSortedFunds();
  if(!displayFunds.length){
    summaryBar.style.display='none'; container.style.display='none';
    container.innerHTML=`<div class="empty-state"><div class="icon">📈</div><div class="text">${activeGroup===groups[0]?'添加基金开始监控':'该分组暂无基金'}</div></div>`;
    return;
  }
  summaryBar.style.display='flex'; container.style.display='block';
  const gt = getGridTemplate();

  // 表头行
  let html = `<div class="lh-row" style="grid-template-columns:${gt}">`;
  columns.forEach((col, idx) => {
    if (col.visible === false) return;
    const sortClass = col.sortable ? 'lh-sort' : '';
    const activeClass = sortField === col.field ? (sortDir === 1 ? 'asc' : 'desc') : '';
    const sortArrow = col.sortable ? `<span class="sort-arrow"></span>` : '';
    const gearIcon = col.field === 'name' ? ` <span class="col-gear" onclick="event.stopPropagation();showColSettings()" title="列设置">⚙</span>` : '';
    html += `<div class="lh-cell ${sortClass} ${activeClass}" data-field="${col.field}" onclick="toggleSort('${col.field}')">${col.title}${sortArrow}${gearIcon}</div>`;
  });
  html += '</div>';

  let groupTotalMV = 0, sumLocked = 0, sumPToday = 0, sumPTotal = 0, sumRateW = 0, sumRateWeight = 0, sumCost = 0;

  displayFunds.forEach(fund=>{
    const mv = getMarketValue(fund);
    groupTotalMV += mv;
    const dwjz=parseFloat(fund.dwjz)||0,gsz=parseFloat(fund.gsz)||0,gszzl=parseFloat(fund.gszzl)||0;
    const amt=fund.amount||0,name=fund.name||('基金'+fund.code);

    const isMarketOpen=isMarketOpenNow(fund);

    const todayP = calcTodayProfit(fund, isMarketOpen);
    const isUp=isMarketOpen ? (gszzl>0) : (todayP>0);
    const isDown=isMarketOpen ? (gszzl<0) : (todayP<0);
    const cc=isUp?'up':isDown?'down':'';

    const lockedProfit = (isMarketOpen || fund._tnCalculated) ? ((fund.totalProfit !== null && fund.totalProfit !== undefined) ? fund.totalProfit : 0) : calcDisplayProfit(fund, isMarketOpen);
    const lockedMarketVal = (fund.amount || 0) + lockedProfit;
    const lockedRate = calcDisplayRate(lockedProfit, amt);

    const lpc = lockedProfit !== null ? (lockedProfit > 0 ? 'up' : lockedProfit < 0 ? 'down' : '') : '';
    const lrc = lockedRate !== null ? (lockedRate > 0 ? 'up' : lockedRate < 0 ? 'down' : '') : '';

    const valDwjz=parseFloat(fund._valuationDwjz)||0;

    const rowClass = isUp ? 'up' : isDown ? 'down' : '';

    const fsrq = fund.jzrq||'';
    const isUpdated = !isMarketOpen;
    const jzrqShort = fsrq ? fsrq.slice(5).replace('-', '/') : '';
    const updatedTag = isUpdated ? `<span class="updated-tag">已更新</span>` : '';

    let colsHtml = '';
    columns.forEach(col => {
      if (col.visible === false) return;
      if (col.field === 'name') {
        const maxNameLen = 16;
        const displayName = name.length > maxNameLen ? name.slice(0, maxNameLen) + '…' : name;
        colsHtml += `<div class="fm-name" data-code="${fund.code}">
          <div class="fm-fundname" title="${name}">${displayName}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap;">
            ${updatedTag}
            <div class="fm-amount-val">${hideMarketVal ? '<span class="val-hidden">****</span>' : formatMoney(lockedMarketVal)}</div>
          </div>
        </div>`;
      } else if (col.field === 'amount') {
        const valuationDwjz = parseFloat(fund._valuationDwjz) || 0;
        let realRate = gszzl;
        if (dwjz > 0 && valuationDwjz > 0 && Math.abs(dwjz - valuationDwjz) > 0.0001) {
          realRate = ((dwjz - valuationDwjz) / valuationDwjz) * 100;
        }
        const rateUp = realRate > 0, rateDown = realRate < 0;
        const rateCc = rateUp ? 'up' : rateDown ? 'down' : '';
        colsHtml += `<div class="fm-rate" data-code="${fund.code}">
          <div class="fm-rate-val ${rateCc}">${rateUp?'+':rateDown?'-':''}${Math.abs(realRate).toFixed(2)}%</div>
        </div>`;
      } else if (col.field === 'gszzl') {
        colsHtml += `<div class="fm-today" data-code="${fund.code}">
          <div class="fm-profit ${cc}">${todayP>=0?'+':'-'}${formatMoney(Math.abs(todayP))}</div>
        </div>`;
      } else if (col.field === 'profit') {
        colsHtml += `<div class="fm-total" data-code="${fund.code}">
          ${lockedProfit!==null
            ? `<div class="fm-total-val ${lpc}">${lockedProfit>=0?'+':'-'}${formatMoney(Math.abs(lockedProfit))}</div>
               <div class="fm-total-rate ${lrc}">${lockedRate != null ? (lockedRate>=0?'+':'') + lockedRate.toFixed(2) + '%' : '--'}</div>`
            : `<div class="fm-total-val pending">未校准</div>
               <div class="fm-total-rate pending">--</div>`}
        </div>`;
      } else if (col.field === 'dwjz') {
        const jzrqFmt = fsrq ? fsrq.slice(2).replace(/-/g, '-') : '--';
        colsHtml += `<div class="fm-dwjz" data-code="${fund.code}">
          <div class="fm-dwjz-val">${jzrqFmt}/${dwjz || '--'}</div>
        </div>`;
      } else if (col.field === 'cost') {
        const costVal = Number(fund.cost) || 0;
        colsHtml += `<div class="fm-cost" data-code="${fund.code}">
          <div class="fm-cost-val">${costVal > 0 ? costVal.toFixed(4) : '--'}</div>
        </div>`;
      } else if (col.field === 'shares') {
        colsHtml += `<div class="fm-shares" data-code="${fund.code}">
          <div class="fm-shares-val">${(fund.shares||0).toFixed(2)}</div>
        </div>`;
      } else if (col.field === 'ratio') {
        const ratioVal = groupTotalMV > 0 ? (lockedMarketVal / groupTotalMV * 100) : 0;
        colsHtml += `<div class="fm-ratio" data-code="${fund.code}">
          <div class="fm-ratio-val">${ratioVal.toFixed(1)}%</div>
        </div>`;
      } else if (col.field === 'gsz') {
        colsHtml += `<div class="fm-gsz" data-code="${fund.code}">
          <div class="fm-gsz-val">${gsz || '--'}</div>
        </div>`;
      } else if (col.field === 'sector') {
        const sectors = fund.sectors || [];
        colsHtml += `<div class="fm-sector"><div class="fm-sector-val">${sectors.join(' ')||'--'}</div></div>`;
      } else if (col.field === 'code') {
        colsHtml += `<div class="fm-code"><div class="fm-code-val">${fund.code}</div></div>`;
      }
    });

    // 基金行单元格
    html+=`<div class="fund-row ${rowClass}" data-code="${fund.code}" style="grid-template-columns:${gt}">
        ${colsHtml}
      </div>`;

    // 汇总栏累加
    sumLocked += lockedMarketVal;
    sumPToday += todayP;
    sumPTotal += lockedProfit;
    sumCost += amt;
    const vd = parseFloat(fund._valuationDwjz) || 0;
    let realRate = gszzl;
    if (dwjz > 0 && vd > 0 && Math.abs(dwjz - vd) > 0.0001) realRate = ((dwjz - vd) / vd) * 100;
    if (lockedMarketVal > 0) { sumRateW += realRate * lockedMarketVal; sumRateWeight += lockedMarketVal; }
  });

  const totalWidth = columns.reduce((s, c) => c.visible !== false ? s + c.fr : s, 0);
  container.innerHTML=html;
  container.style.minWidth = totalWidth + 'px';

  // ===== 汇总栏（已在主循环中累加） =====
  const r = sumCost > 0 ? sumPTotal / sumCost * 100 : 0;
  const cc1 = sumPToday > 0 ? 'up' : sumPToday < 0 ? 'down' : 'flat';
  const cc2 = sumPTotal > 0 ? 'up' : sumPTotal < 0 ? 'down' : 'flat';
  const cc3 = r > 0 ? 'up' : r < 0 ? 'down' : 'flat';

  const sumInvestRate = sumRateWeight>0 ? sumRateW/sumRateWeight : 0;
  const ci = sumInvestRate>0?'up':sumInvestRate<0?'down':'flat';
  document.getElementById('sumLocked').textContent=formatMoney(sumLocked);
  document.getElementById('sumLocked').className='value flat';
  document.getElementById('sumInvest').textContent=(sumInvestRate>=0?'+':'')+sumInvestRate.toFixed(2)+'%';
  document.getElementById('sumInvest').className='value '+ci;
  document.getElementById('sumProfitToday').textContent=(sumPToday>=0?'+':'-')+formatMoney(Math.abs(sumPToday));
  document.getElementById('sumProfitToday').className='value '+cc1;
  document.getElementById('sumProfitTotal').textContent=(sumPTotal>=0?'+':'-')+formatMoney(Math.abs(sumPTotal));
  document.getElementById('sumProfitTotal').className='value '+cc2;
  document.getElementById('sumProfitRate').textContent=(r>=0?'+':'-')+Math.abs(r).toFixed(2)+'%';
  document.getElementById('sumProfitRate').className='value sub-value '+cc3;
}

function _fmtOpMeta(op) {

  const sl = STATUS_LABELS[op.status] || op.status;

  const infoLine = `${op.date} · ${op.timeType === 'before3' ? '3点前' : '3点后'}${op.status === 'confirmed' && op.confirmDate ? ' · ' + op.confirmDate + '确认 · 净值' + op.confirmNav : ''}`;
  const badge = `<span style="font-size:11px;font-weight:600;color:${sc};background:${sc}15;padding:2px 8px;border-radius:4px;">${sl}</span>`;
  return { unit, sc, sl, tl, canCancel, canDelete, infoLine, badge };
}
function $ic(el, txt, clr) {
  if (!el) return;
  el.textContent = txt;
  if (clr) el.style.color = clr;
}
function calcPct(currVal, prevVal) {
  if (!prevVal || prevVal === 0) return { txt: '', clr: '' };
  const chgVal = ((currVal - prevVal) / prevVal * 100);
  const absVal = Math.abs(chgVal);
  if (absVal < 0.005) return { txt: '涨幅 0.00%', clr: 'var(--text-muted)' };
  const sign = chgVal > 0 ? '+' : '-';
  return { txt: `涨幅 ${sign}${absVal.toFixed(2)}%`, clr: chgVal > 0 ? 'var(--color-up)' : 'var(--color-down)' };
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad(n){return String(n).padStart(2,'0');}
function formatDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function todayStr(){return formatDate(new Date());}
function _costNav(f) { return f && f.amount > 0 && f.shares > 0 ? f.amount / f.shares : 0; }
function r2(n){ return Math.round(n*100)/100; }
function formatMoney(n){ if(isNaN(n))return'0.00'; const sign = n < 0 ? '-' : ''; return sign + r2(Math.abs(n)).toFixed(2); }

// ============ 操作记录与交易日工具 ============

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// 创建操作记录
function createOperation(type, date, timeType, amount, isMoney) {
  return {
    id: generateId(),
    type, // 'add' | 'reduce'
    date, // 用户选择的日期
    timeType, // 'before3' | 'after3'
    amount, // 金额或份额
    isMoney, // true=按金额, false=按份额
    confirmDate: null, // 计算后填写
    confirmNav: null,
    confirmShares: null,
    status: 'pending', // 'pending' | 'confirmed' | 'cancelled'
    createdAt: new Date().toISOString()
  };
}

// 为基金添加操作记录
async function addFundOperation(code, type, date, timeType, amount, isMoney) {
  const fund = funds.find(f => f.code === code);
  if (!fund) return null;
  const op = createOperation(type, date, timeType, amount, isMoney);
  const dd = new Date(date);
  if (timeType === 'after3') dd.setDate(dd.getDate() + 1);
  op.confirmDate = dd.toISOString().slice(0, 10);
  fund.operations = fund.operations || [];
  fund.operations.push(op);
  saveFunds();
  await confirmSingleOp(fund, op);
  if (op.status === 'confirmed') { saveFunds(); renderFunds(); }
  return op;
}

async function confirmSingleOp(fund, op) {
  if (op.status !== 'pending' || !op.confirmDate) return;
  const result = await fetchSmartNetValue(fund.code, op.confirmDate);
  if (result && result.value > 0) {
    op.confirmNav = result.value;
    op.confirmDate = result.date;
    const nav = result.value;
    if (op.type === 'add') {
      const buyShares = op.amount / nav;
      op.confirmShares = buyShares;
      const oldShare = fund.shares || 0;
      const oldAmount = fund.amount || 0;
      const newShare = oldShare + buyShares;
      const newAmount = oldAmount + op.amount;
      fund.amount = r2(newAmount);
      fund.cost = newShare > 0 ? (newAmount / newShare) : 0;
      fund.shares = newShare;
    } else if (op.type === 'reduce') {
      const sellShares = op.isMoney ? (op.amount / nav) : op.amount;
      op.confirmShares = sellShares;
      const oldShare = fund.shares || 0;
      fund.shares = Math.max(0, oldShare - sellShares);
      if (fund.shares <= 0) { fund.cost = 0; fund.amount = 0; }
      else {
        const oldCost = Number(fund.cost) || 0;
        fund.amount = r2(oldCost * fund.shares);
      }
    }
    op.status = 'confirmed';
  }
}

// 检查并自动确认待处理的操作
async function checkPendingOperations() {
  let confirmedCount = 0;
  for (const fund of funds) {
    if (!fund.operations || !fund.operations.length) continue;
    const pendingOps = fund.operations.filter(op => op.status === 'pending');
    if (!pendingOps.length) continue;
    for (const op of pendingOps) {
      await confirmSingleOp(fund, op);
      if (op.status === 'confirmed') confirmedCount++;
    }
  }
  if (confirmedCount > 0) {
    saveFunds();
    renderFunds();
    showToast(`${confirmedCount}笔操作已自动确认`, 'success');
  }
  return confirmedCount;
}

// 撤回操作（pending直接删除；confirmed仅标记，不影响持仓）
function cancelOperation(code, opId) {
  const fund = funds.find(f => f.code === code);
  if (!fund?.operations) return false;
  const idx = fund.operations.findIndex(op => op.id === opId);
  if (idx < 0) return false;
  if (fund.operations[idx].status === 'pending') fund.operations.splice(idx, 1);
  else fund.operations[idx].status = 'cancelled';
  saveFunds();
  return true;
}

// 删除操作记录（永久删除，不影响持仓）
function deleteOperation(code, opId) {
  const fund = funds.find(f => f.code === code);
  if (!fund?.operations) return false;
  const idx = fund.operations.findIndex(op => op.id === opId);
  if (idx < 0) return false;
  fund.operations.splice(idx, 1);
  saveFunds();
  return true;
}

// ============ 加减仓弹窗交互 ============
let _tradeTimeType = (()=>{ try{ const s=localStorage.getItem('fund_monitor_tradetime'); return s ? JSON.parse(s) : {}; }catch(e){ return {}; } })();

function setTradeTimeType(code, type) {
  _tradeTimeType[code] = type;
  try { localStorage.setItem('fund_monitor_tradetime', JSON.stringify(_tradeTimeType)); } catch(e) {}
  const before3 = document.getElementById('tradeBefore3_' + code);
  const after3 = document.getElementById('tradeAfter3_' + code);
  if (before3) before3.classList.toggle('active', type === 'before3');
  if (after3) after3.classList.toggle('active', type === 'after3');
}

// 获取可用份额（扣除待确认减仓）
function getAvailableShares(fund) {
  if (!fund) return 0;
  let shares = fund.shares || 0;
  const ops = fund.operations || [];
  for (const op of ops) {
    if (op.status === 'pending' && op.type === 'reduce') {
      if (op.isMoney) continue;
      shares -= (op.amount || 0);
    }
  }
  return Math.max(0, shares);
}

// 设置减仓份额（1/4, 1/3, 1/2, 全部）
function setReduceShares(code, ratio) {
  const fund = funds.find(f => f.code === code);
  if (!fund) return;
  const shares = getAvailableShares(fund);
  const input = document.getElementById('reduceShares_' + code);
  if (!input) return;
  if (shares <= 0) { showToast('没有可卖出的份额', 'error'); return; }
  if (ratio >= 1) {
    input.value = shares.toFixed(2);
  } else {
    input.value = (shares * ratio).toFixed(2);
  }
}
// 统一提交加仓/减仓
function _submitTrade(code, type) {
  const isAdd = type === 'add';
  const amountInput = document.getElementById(isAdd ? ('addAmount_' + code) : ('reduceShares_' + code));
  const dateInput = document.getElementById('addDate_' + code);
  const v = parseFloat(amountInput?.value);
  if (isNaN(v) || v <= 0) { showToast(isAdd ? '请输入有效金额' : '请输入有效份额', 'error'); return; }
  const date = dateInput?.value;
  if (!date) { showToast('请选择日期', 'error'); return; }
  const fund = funds.find(f => f.code === code);
  if (!isAdd && fund && v > getAvailableShares(fund)) { showToast('卖出份额超出可用份额', 'error'); return; }
  const timeType = _tradeTimeType[code] || 'before3';
  const fundName = fund?.name || code;
  const timeLabel = timeType === 'before3' ? '3点前' : '3点后';
  const label = isAdd ? '加仓' : '减仓';
  const unit = isAdd ? '元' : '份';
  showConfirm(`确认${label} ${fundName}\n${isAdd ? '金额' : '份额'}：${v}${unit}\n日期：${date} · ${timeLabel}`, async () => {
    await submitTradeRaw(code, type, date, timeType, v, isAdd);
    amountInput.value = '';
    renderTradeOpList(code, isAdd ? 'addOpList' : 'reduceOpList');
  });
}
function submitAddTrade(code) { _submitTrade(code, 'add'); }
function submitReduceTrade(code) { _submitTrade(code, 'reduce'); }

// 提交交易核心逻辑
async function submitTradeRaw(code, type, date, timeType, amount, isMoney) {
  const fund = funds.find(f => f.code === code);
  if (!fund) return;
  // 获取历史净值数据（用于交易日判断）
  if (!fund.history) {
    showToast('正在获取历史净值...', 'warning');
    await fetchFundHistory(code);
  }
  const op = await addFundOperation(code, type, date, timeType, amount, isMoney);
  if (!op) { showToast('操作失败', 'error'); return; }
  const typeLabel = type === 'add' ? '加仓' : '减仓';
  const unitLabel = isMoney ? '元' : '份';
  if (op.status === 'confirmed') {
    showToast(`${typeLabel} ${amount}${unitLabel}（${date}）已确认 · 净值${op.confirmNav}`, 'success');
  } else {
    showToast(`${typeLabel} ${amount}${unitLabel}（${date}）净值暂未更新，已加入待处理队列`, 'info');
  }
}

// 渲染某基金的操作记录列表（支持指定容器ID）
function renderTradeOpList(code, containerId) {
  const container = document.getElementById((containerId || 'tradeOpList_') + code);
  if (!container) return;
  const fund = funds.find(f => f.code === code);
  const ops = fund?.operations || [];
  if (!ops.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:12px;">暂无操作记录</div>';
    return;
  }
  let html = '<div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">操作记录</div>';
  // 按时间倒序
  const sorted = [...ops].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  sorted.forEach(op => {
    const m = _fmtOpMeta(op);
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:12px;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span style="font-weight:500;color:var(--text-primary);">${m.tl} ${op.amount}${m.unit}</span>
          <span style="color:${m.sc};font-size:11px;font-weight:600;">${m.sl}</span>
        </div>
        <div style="color:var(--text-muted);font-size:10px;margin-top:2px;">${m.infoLine}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        ${m.canCancel ? `<button class="action-btn btn-secondary" style="padding:2px 8px;font-size:10px;" onclick="_opActionAndRefresh('cancel','${code}','${op.id}','${containerId || 'tradeOpList_'}')">撤回</button>` : ''}
        ${m.canDelete ? `<button class="action-btn btn-secondary" style="padding:2px 8px;font-size:10px;" onclick="_opActionAndRefresh('delete','${code}','${op.id}','${containerId || 'tradeOpList_'}')">删除</button>` : ''}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function _opActionAndRefresh(action, code, opId, containerId) {
  const fn = action === 'cancel' ? cancelOperation : deleteOperation;
  if (!fn(code, opId)) return;
  showToast(action === 'cancel' ? '已撤回' : '已删除', 'success');
  renderTradeOpList(code, containerId);
}

// ============ 全局操作记录弹窗 ============
function openGlobalOpList() {
  renderGlobalOpList();
  document.getElementById('globalOpModal').classList.add('active');
}
function closeGlobalOpModal() {
  document.getElementById('globalOpModal').classList.remove('active');
}
function renderGlobalOpList() {
  const container = document.getElementById('globalOpModalBody');
  let allOps = [];
  funds.forEach(fund => {
    if (!fund.operations || !fund.operations.length) return;
    fund.operations.forEach(op => {
      allOps.push({ ...op, fundName: fund.name || fund.code, fundCode: fund.code });
    });
  });
  const pendingCount = allOps.filter(op => op.status === 'pending').length;
  let html = '';
  if (pendingCount > 0) {
    html += `<div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px;background:var(--accent-light);padding:8px 12px;border-radius:8px;">有 ${pendingCount} 笔待确认操作，将在下次刷新时自动确认</div>`;
  }
  if (!allOps.length) {
    html += '<div style="font-size:14px;color:var(--text-muted);text-align:center;padding:40px;">暂无操作记录</div>';
    container.innerHTML = html;
    return;
  }
  // 按时间倒序
  allOps.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  allOps.forEach(op => {
    const m = _fmtOpMeta(op);
    html += `<div style="padding:10px 0;border-bottom:1px solid var(--border-subtle);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <span style="font-size:13px;font-weight:600;color:var(--text-primary);">${op.fundName}</span>
            <span style="font-size:12px;font-weight:500;color:var(--text-secondary);">${m.tl} ${op.amount}${m.unit}</span>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${m.infoLine}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
          ${m.badge}
          ${m.canCancel ? `<button class="action-btn btn-secondary" style="padding:2px 8px;font-size:10px;" onclick="_opActionGlobal('cancel','${op.fundCode}','${op.id}')">撤回</button>` : ''}
          ${m.canDelete ? `<button class="action-btn btn-secondary" style="padding:2px 8px;font-size:10px;" onclick="_opActionGlobal('delete','${op.fundCode}','${op.id}')">删除</button>` : ''}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}
function _opActionGlobal(action, code, opId) {
  const fn = action === 'cancel' ? cancelOperation : deleteOperation;
  if (!fn(code, opId)) return;
  showToast(action === 'cancel' ? '已撤回' : '已删除', 'success');
  renderGlobalOpList();
  if (action === 'cancel') renderFunds();
}

function openSectorPanel() {
  const body = document.getElementById('sectorBody');
  const batchBody = document.getElementById('sectorBatchBody');
  // 重置到单个输入 tab
  switchSectorTab('single', document.querySelector('.sector-tab-btn'));

function switchSectorTab(tab, btn) {
  // 更新按钮样式
  document.querySelectorAll('.sector-tab-btn').forEach(b => {
    b.classList.remove('active');
    b.style.color = 'var(--text-muted)';
    b.style.borderBottomColor = 'transparent';
  });
  btn.classList.add('active');
  btn.style.color = 'var(--accent)';
  btn.style.borderBottomColor = 'var(--accent)';
  // 切换内容区
  const body = document.getElementById('sectorBody');
  const batchBody = document.getElementById('sectorBatchBody');
  if (tab === 'single') {
    body.style.display = '';
    batchBody.style.display = 'none';
  } else {
    body.style.display = 'none';
    batchBody.style.display = '';
  }
}

function processBatchSectors() {
  const raw = document.getElementById('sectorBatchInput').value.trim();
  if (!raw) { showToast('请输入内容', 'error'); return; }
  if (!funds.length) { showToast('暂无基金数据', 'error'); return; }

  const lines = raw.split(/[\n\r]+/).filter(l => l.trim());
  let matched = 0, unmatched = 0;
  const sectorMap = {};

  lines.forEach(line => {
    const parts = line.trim().split(/[,\s，、\t]+/);
    if (parts.length < 2) { unmatched++; return; }
    const identifier = parts[0].trim();
    const sectorName = parts[1].trim();

    const byCode = funds.find(f => f.code === identifier);
    const byNameExact = funds.find(f => f.name === identifier);
    const byNameFuzzy = funds.find(f => f.name && f.name.includes(identifier));
    const fund = byCode || byNameExact || byNameFuzzy;

    if (!fund) { unmatched++; return; }
    matched++;
    if (!sectorMap[fund.code]) sectorMap[fund.code] = [];
    if (!sectorMap[fund.code].includes(sectorName)) {
      sectorMap[fund.code].push(sectorName);
    }
  });

  // 替换模式：匹配到的基金板块完全替换为本次导入的数据
  Object.keys(sectorMap).forEach(code => {
    const fund = funds.find(f => f.code === code);
    if (fund) fund.sectors = sectorMap[code];
  });

  saveFunds();
  closeSectorPanel();
  renderFunds();
  showToast(`批量导入完成：匹配 ${matched} 条，未匹配 ${unmatched} 条`, matched > 0 ? 'success' : 'error');
}

function closeSectorPanel() {
  document.getElementById('sectorModal').classList.remove('active');
}

function saveSectors() {
  // 判断当前激活的是哪个 tab
  const activeTab = document.querySelector('.sector-tab-btn.active');
  const isBatch = activeTab && activeTab.textContent.trim().includes('批量导入');

  if (isBatch) {
    // 批量导入 tab：直接处理 textarea 内容
    processBatchSectors();
    return;
  }

  // 单个输入 tab：逐条读取 input 数据
  const inputs = document.querySelectorAll('[data-sector-code]');
  inputs.forEach(inp => {
    const code = inp.dataset.sectorCode;
    const fund = funds.find(f => f.code === code);
    if (!fund) return;
    const raw = inp.value.trim();
    fund.sectors = raw ? raw.split(/[,，、\s]+/).filter(Boolean) : [];
  });
  saveFunds();
  renderFunds();
  closeSectorPanel();
  showToast('板块关联已保存', 'success');
}
